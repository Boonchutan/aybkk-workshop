<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYBKK - Student Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* student-knowledge.html — student-facing knowledge browser. Beech/walnut
       palette. Problem-card side-stripe replaced with mossy-beech tint (full
       background, no side-bar). Asana modal in carved overlay. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 600px; margin: 0 auto; padding: var(--space-5) var(--space-4) var(--space-8); }

    header { padding: var(--space-6) 0 var(--space-5); text-align: center; }
    .logo {
      font-family: var(--font-display);
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
    }
    .subtitle {
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
      margin-top: 6px;
    }

    /* Tabs — carved track + protruding active tab */
    .tabs {
      display: flex;
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 5px;
      margin-bottom: var(--space-5);
      box-shadow:
        inset 3px 3px 6px var(--shadow-dark),
        inset -2px -2px 4px var(--shadow-light);
    }
    .tab {
      flex: 1;
      padding: 11px 8px;
      text-align: center;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--dur-base) var(--ease-spring);
    }
    .tab.active {
      background: var(--surface);
      color: var(--primary-deep);
      box-shadow:
        4px 4px 10px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
    }

    .section { display: none; }
    .section.active { display: block; }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: 10px;
      cursor: pointer;
      box-shadow:
        6px 6px 14px var(--shadow-dark),
        -3px -3px 8px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .card:hover { transform: translateY(-2px); }
    .card.expanded {
      transform: none;
      background: var(--surface-2);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -2px -2px 0 rgba(253, 250, 242, 0.85),
        inset 5px 5px 12px var(--shadow-dark);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    .card-count {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-soft);
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }
    .card-arrow {
      font-size: 14px;
      color: var(--ink-soft);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .card.expanded .card-arrow {
      transform: rotate(180deg);
      color: var(--primary-deep);
    }

    .card-content {
      display: none;
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px dashed var(--shadow-dark);
    }
    .card.expanded .card-content { display: block; }

    /* Problem cards — mossy-beech tint (no side-stripe). Background swap
       signals "this is a known issue / has solutions" without a banned
       border-left accent. */
    .problem-card { background: #ddd9c2; }
    .problem-card.expanded { background: #c5cba5; }
    .problem-card .card-title { color: #4f5d3a; }
    .problem-card .card-content {
      margin: var(--space-3) calc(var(--space-4) * -1) calc(var(--space-4) * -1);
      padding: var(--space-3) var(--space-4);
      border-top: 1px dashed rgba(80, 95, 60, 0.3);
      background: rgba(197, 203, 165, 0.55);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
    }

    .solution-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .solution-label:first-child { margin-top: 0; }

    .asana-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .asana-tag {
      background: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--ink);
      box-shadow:
        2px 2px 4px var(--shadow-dark),
        -1px -1px 2px var(--shadow-light);
    }
    /* Asana flagged as a problem-area — clay rust */
    .asana-tag.problem {
      background: #ecd5be;
      color: #8d4f2c;
      box-shadow:
        inset 2px 2px 4px rgba(141, 79, 44, 0.16),
        inset -1px -1px 2px rgba(253, 250, 242, 0.55);
    }

    /* Asana modal — dark photo viewer */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(20, 14, 8, 0.85);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: var(--space-5);
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: var(--space-5);
      box-shadow:
        20px 20px 40px rgba(0, 0, 0, 0.4),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-5);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: #2f2517;
      letter-spacing: -0.012em;
      text-shadow: var(--text-carve-soft);
    }
    .modal-close {
      background: var(--surface-2);
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 16px;
      cursor: pointer;
      color: var(--primary-deep);
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }

    .modal-section { margin-bottom: var(--space-4); }
    .modal-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: 8px;
    }
    .modal-asanas { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-asana-tag {
      background: var(--surface-2);
      color: var(--primary-deep);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -2px -2px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .modal-asana-tag:hover { transform: translateY(-1px); }

    /* Deep-dive CTA — full clay-button */
    .deep-dive-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      color: #f1e2c4;
      border: none;
      border-radius: var(--radius-md);
      padding: 16px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: var(--space-5);
      text-align: center;
      text-shadow:
        1px 1px 0 rgba(255, 240, 215, 0.7),
        -1px -1px 1px rgba(50, 28, 10, 0.85);
      box-shadow:
        12px 12px 26px rgba(120, 80, 40, 0.30),
        -6px -6px 14px var(--shadow-light),
        inset 4px 4px 10px rgba(255, 240, 215, 0.5);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .deep-dive-btn:hover { transform: translateY(-3px) scale(1.02); }

    .loading,
    .empty {
      text-align: center;
      padding: var(--space-6);
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
    }

    footer {
      text-align: center;
      padding: var(--space-6) 0;
      font-family: var(--font-body);
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">AYBKK</div>
      <div class="subtitle">Knowledge Universe</div>
    </header>
    
    <!-- Tab Navigation -->
    <div class="tabs">
      <div class="tab active" data-tab="movements">Movements</div>
      <div class="tab" data-tab="asanas">Asanas</div>
      <div class="tab" data-tab="problems">Problems</div>
    </div>
    
    <!-- Movements Section -->
    <div class="section active" id="section-movements">
      <div id="movements-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <!-- Asanas Section -->
    <div class="section" id="section-asanas">
      <div id="asanas-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <!-- Problems Section -->
    <div class="section" id="section-problems">
      <div id="problems-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <footer>
      AYBKK Teaching Universe
    </footer>
  </div>
  
  <!-- Asana Detail Modal -->
  <div class="modal" id="asana-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Asana Name</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-section">
        <div class="modal-label">Movement Types</div>
        <div class="modal-asanas" id="modal-movements"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Related Asanas</div>
        <div class="modal-asanas" id="modal-related"></div>
      </div>
      <button class="deep-dive-btn" onclick="openDeepDive()">
        View in Knowledge Graph →
      </button>
    </div>
  </div>

  <script>
    // State
    let movements = [];
    let asanas = [];
    let problems = [];
    let currentAsana = null;
    
    // Load all data
    async function loadData() {
      try {
        const [movementsRes, asanasRes, problemsRes] = await Promise.all([
          fetch('/api/student/movements').then(r => r.json()),
          fetch('/api/student/asanas').then(r => r.json()),
          fetch('/api/student/problems').then(r => r.json())
        ]);
        
        movements = movementsRes;
        asanas = asanasRes;
        problems = problemsRes;
        
        renderMovements();
        renderAsanas();
        renderProblems();
      } catch (err) {
        console.error('Failed to load:', err);
        document.querySelectorAll('.loading').forEach(el => el.textContent = 'Failed to load data');
      }
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('section-' + tab.dataset.tab).classList.add('active');
      });
    });
    
    // Render movements
    function renderMovements() {
      const container = document.getElementById('movements-list');
      if (movements.length === 0) {
        container.innerHTML = '<div class="empty">No movements found</div>';
        return;
      }
      
      container.innerHTML = movements.map(m => `
        <div class="card" onclick="toggleCard(this)">
          <div class="card-header">
            <div class="card-title">${m.name}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="card-count">${m.asanaCount} asanas</span>
              <span class="card-arrow">▼</span>
            </div>
          </div>
          <div class="card-content">
            <div class="asana-list" id="movement-${m.name.replace(/[^a-zA-Z0-9]/g, '-')}"></div>
          </div>
        </div>
      `).join('');
      
      // Load asanas for each movement
      movements.forEach(m => {
        fetch('/api/student/movement/' + encodeURIComponent(m.name))
          .then(r => r.json())
          .then(asanas => {
            const el = document.getElementById('movement-' + m.name.replace(/[^a-zA-Z0-9]/g, '-'));
            if (el) {
              el.innerHTML = asanas.map(a => 
                `<span class="asana-tag" onclick="event.stopPropagation();showAsanaDetail('${a}')">${a}</span>`
              ).join('');
            }
          });
      });
    }
    
    // Render asanas
    function renderAsanas() {
      const container = document.getElementById('asanas-list');
      if (asanas.length === 0) {
        container.innerHTML = '<div class="empty">No asanas found</div>';
        return;
      }
      
      container.innerHTML = asanas.map(a => `
        <div class="card" onclick="showAsanaDetail('${a.name}')">
          <div class="card-header">
            <div class="card-title">${a.name}</div>
            <span class="card-arrow">→</span>
          </div>
        </div>
      `).join('');
    }
    
    // Render problems
    function renderProblems() {
      const container = document.getElementById('problems-list');
      if (problems.length === 0) {
        container.innerHTML = '<div class="empty">No problems found</div>';
        return;
      }
      
      container.innerHTML = problems.map(p => `
        <div class="card problem-card" onclick="toggleCard(this)">
          <div class="card-header">
            <div class="card-title">${p.problem}</div>
            <span class="card-arrow">▼</span>
          </div>
          <div class="card-content">
            ${Object.entries(p.solutions).map(([movement, asanaList]) => `
              <div class="solution-label">${movement}</div>
              <div class="asana-list">
                ${asanaList.map(a => `<span class="asana-tag problem" onclick="event.stopPropagation();showAsanaDetail('${a}')">${a}</span>`).join('')}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }
    
    // Toggle card expand
    function toggleCard(card) {
      card.classList.toggle('expanded');
    }
    
    // Show asana detail
    async function showAsanaDetail(name) {
      try {
        const res = await fetch('/api/student/asana/' + encodeURIComponent(name));
        const data = await res.json();
        
        if (data.error) {
          console.error(data.error);
          return;
        }
        
        currentAsana = data;
        
        document.getElementById('modal-title').textContent = data.name;
        document.getElementById('modal-movements').innerHTML = data.movements.map(m => 
          `<span class="asana-tag">${m}</span>`
        ).join('');
        document.getElementById('modal-related').innerHTML = data.related.map(a => 
          `<span class="modal-asana-tag" onclick="showAsanaDetail('${a}')">${a}</span>`
        ).join('') || '<span class="asana-tag">None found</span>';
        
        document.getElementById('asana-modal').classList.add('show');
      } catch (err) {
        console.error('Failed to load asana:', err);
      }
    }
    
    // Close modal
    function closeModal() {
      document.getElementById('asana-modal').classList.remove('show');
      currentAsana = null;
    }
    
    // Open deep dive (opens Plato's full knowledge page)
    function openDeepDive() {
      if (currentAsana) {
        window.open('/knowledge.html', '_blank');
      }
    }
    
    // Close modal on backdrop click
    document.getElementById('asana-modal').addEventListener('click', (e) => {
      if (e.target.id === 'asana-modal') {
        closeModal();
      }
    });
    
    // Initialize
    loadData();
  </script>
</body>
</html>
