# Force npm install (not npm ci) so Railway accepts new dependencies
# added to package.json before the lock file is updated locally.
[phases.install]
cmds = [
  "npm install",
  "curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ./cloudflared && chmod +x ./cloudflared && echo '[nixpacks] cloudflared binary ready' || echo '[nixpacks] cloudflared binary download failed'"
]
