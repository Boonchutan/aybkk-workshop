<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russia WS Students — AYBKK 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #faf8f5; color: #2a2420; padding: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #3e2723; }
    .subtitle { font-size: 13px; color: #8b7d6b; margin-bottom: 16px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .btn { background: #3e2723; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
    .btn.secondary { background: #c49564; }
    .btn.ghost { background: #fff; color: #3e2723; border: 1.5px solid #d4c5b3; }
    .btn.ghost.active { background: #3e2723; color: #fff; border-color: #3e2723; }
    .count { font-size: 13px; color: #8b7d6b; margin-bottom: 12px; }
    .student-card {
      background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: flex; gap: 14px; align-items: flex-start;
    }
    .photo { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #f0ebe5; border: 2px solid #e8e0d8; }
    .photo.placeholder { display: flex; align-items: center; justify-content: center; color: #c49564; font-size: 22px; font-weight: 600; }
    .info { flex: 1; min-width: 0; }
    .row1 { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .name { font-size: 16px; font-weight: 600; color: #3e2723; }
    .city-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .city-badge.spb { background: #e3f2fd; color: #1565c0; }
    .city-badge.moscow { background: #ffebee; color: #c62828; }
    .meta { font-size: 12px; color: #8b7d6b; margin-top: 2px; }
    .meta-row { margin-top: 6px; font-size: 12px; color: #5d4037; line-height: 1.5; }
    .meta-row strong { color: #3e2723; font-weight: 600; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .actions a, .actions button { font-size: 11px; padding: 6px 10px; border-radius: 8px; border: 1px solid #d4c5b3; background: #faf8f5; color: #5d4037; text-decoration: none; cursor: pointer; }
    .actions a:hover, .actions button:hover { background: #f5ede4; }
    .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
    .qr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .qr-overlay.show { display: flex; }
    .qr-box { background: #fff; border-radius: 20px; padding: 28px 24px; text-align: center; width: 280px; position: relative; }
    .qr-box h2 { font-size: 17px; margin-bottom: 4px; }
    .qr-box p { font-size: 12px; color: #888; margin-bottom: 16px; }
    .qr-box img { width: 220px; height: 220px; border-radius: 8px; }
    .close-btn { position: absolute; top: 12px; right: 14px; background: #f5f5f5; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🪆 Russia WS Students</h1>
  <div class="subtitle">AYBKK Russia WS 2026 — SPB May 1–3 · Moscow May 6–10</div>

  <div class="toolbar">
    <button class="btn ghost active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="btn ghost" data-filter="spb" onclick="setFilter('spb')">SPB</button>
    <button class="btn ghost" data-filter="moscow" onclick="setFilter('moscow')">Moscow</button>
    <button class="btn secondary" onclick="loadStudents()">↻ Refresh</button>
    <button class="btn" onclick="downloadCSV()">⬇ CSV</button>
  </div>

  <div id="count" class="count"></div>
  <div id="list"></div>

  <div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)closeQR()">
    <div class="qr-box">
      <button class="close-btn" onclick="closeQR()">✕</button>
      <h2 id="qrName"></h2>
      <p>Long-press to save</p>
      <img id="qrImg" src="" alt="QR">
    </div>
  </div>

  <script>
    const API = 'https://aybkk-ashtanga.up.railway.app/api';
    let allStudents = [];
    let currentFilter = 'all';

    async function loadStudents() {
      document.getElementById('list').innerHTML = '<div class="empty">Loading...</div>';
      try {
        const res = await fetch(`${API}/orientations/ru`);
        const data = await res.json();
        allStudents = data.students || [];
        render();
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
      }
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('[data-filter]').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
      render();
    }

    function render() {
      const filtered = currentFilter === 'all' ? allStudents : allStudents.filter(s => s.city === currentFilter);
      const cityCounts = { spb: allStudents.filter(s => s.city === 'spb').length, moscow: allStudents.filter(s => s.city === 'moscow').length };
      document.getElementById('count').textContent = `${filtered.length} shown · SPB ${cityCounts.spb} · Moscow ${cityCounts.moscow} · Total ${allStudents.length}`;

      if (!filtered.length) {
        document.getElementById('list').innerHTML = '<div class="empty">No students yet.</div>';
        return;
      }

      document.getElementById('list').innerHTML = filtered.map(s => {
        const initials = (s.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const photo = s.photoUrl
          ? `<img class="photo" src="${s.photoUrl}" alt="${s.name}">`
          : `<div class="photo placeholder">${initials}</div>`;
        const tg = s.telegramUsername ? `@${s.telegramUsername}` : (s.telegramChatId ? `chat ${s.telegramChatId}` : '—');
        const cityKey = s.city || 'spb';
        const cityLabel = cityKey === 'moscow' ? 'Moscow' : 'SPB';
        const link = s.journalLink || '';
        return `<div class="student-card">
          ${photo}
          <div class="info">
            <div class="row1">
              <div class="name">${escapeHtml(s.name || 'Unknown')}</div>
              <span class="city-badge ${cityKey}">${cityLabel}</span>
            </div>
            <div class="meta">${escapeHtml(tg)}${s.size ? ' · ' + escapeHtml(s.size) : ''}${s.experience ? ' · ' + escapeHtml(s.experience) : ''}</div>
            <div class="meta-row"><strong>Email:</strong> ${escapeHtml(s.email || '—')}</div>
            ${s.lastAsana ? `<div class="meta-row"><strong>Last asana:</strong> ${escapeHtml(s.lastAsana)}</div>` : ''}
            ${s.injuries && s.injuries.toLowerCase() !== 'none' && s.injuries !== 'нет' ? `<div class="meta-row"><strong>Injuries:</strong> ${escapeHtml(s.injuries)}</div>` : ''}
            <div class="actions">
              ${link ? `<a href="${link}" target="_blank">Journal ↗</a>` : ''}
              <button onclick="showQR('${s.id}', ${JSON.stringify(s.name || '').replace(/"/g, '&quot;')})">QR</button>
              <button onclick="copyLink('${link}')">Copy link</button>
              ${s.telegramUsername ? `<a href="https://t.me/${s.telegramUsername}" target="_blank">Telegram ↗</a>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function showQR(studentId, name) {
      document.getElementById('qrName').textContent = name;
      document.getElementById('qrImg').src = '';
      document.getElementById('qrOverlay').classList.add('show');
      try {
        const res = await fetch(`${API}/journal/qr/${studentId}`);
        const data = await res.json();
        document.getElementById('qrImg').src = data.qrDataUrl;
      } catch (e) {}
    }

    function closeQR() {
      document.getElementById('qrOverlay').classList.remove('show');
    }

    async function copyLink(link) {
      try { await navigator.clipboard.writeText(link); }
      catch (e) {
        const ta = document.createElement('textarea');
        ta.value = link; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
    }

    function downloadCSV() {
      const url = `${API}/orientations/ru?format=csv${currentFilter !== 'all' ? '&city=' + currentFilter : ''}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = `aybkk-russia-${currentFilter}-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    loadStudents();
  </script>
</body>
</html>
