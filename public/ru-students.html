<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russia WS Students — AYBKK 2026</title>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* ru-students.html — Russia WS roster (admin). Same beech/walnut palette
       as other admin tools. City badges (SPB / Moscow) earth-toned. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      padding: var(--space-4);
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 800;
      letter-spacing: -0.012em;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
      margin-bottom: 4px;
    }
    .subtitle {
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: var(--space-4); }
    .btn {
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      color: #f1e2c4;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-family: var(--font-display);
      font-size: 12px; font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.6), -1px -1px 1px rgba(50, 28, 10, 0.7);
      box-shadow:
        8px 8px 16px rgba(120, 80, 40, 0.30),
        -4px -4px 10px var(--shadow-light),
        inset 3px 3px 6px rgba(255, 240, 215, 0.4);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .btn:hover { transform: translateY(-2px); }
    .btn.secondary {
      background: var(--surface);
      color: var(--primary-deep);
      text-shadow: none;
      box-shadow:
        6px 6px 12px var(--shadow-dark),
        -3px -3px 8px var(--shadow-light);
    }
    .btn.ghost {
      background: var(--surface);
      color: var(--ink-soft);
      text-shadow: none;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
    }
    .btn.ghost.active {
      background: var(--surface-2);
      color: var(--primary-deep);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -2px -2px 0 rgba(253, 250, 242, 0.85),
        inset 5px 5px 10px var(--shadow-dark);
      transform: none;
    }

    .count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: var(--space-3);
    }

    .student-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      box-shadow:
        12px 12px 26px var(--shadow-dark),
        -6px -6px 14px var(--shadow-light),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
      display: flex; gap: 14px; align-items: flex-start;
    }
    .photo {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface-2);
      box-shadow:
        inset 3px 3px 6px var(--shadow-dark),
        inset -2px -2px 4px var(--shadow-light);
    }
    .photo.placeholder {
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      color: var(--primary-deep);
      font-size: 20px; font-weight: 800;
    }
    .info { flex: 1; min-width: 0; }
    .row1 { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }
    .city-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      box-shadow:
        inset 2px 2px 4px rgba(0, 0, 0, 0.10),
        inset -1px -1px 2px rgba(253, 250, 242, 0.45);
    }
    .city-badge.spb { background: #c5cba5; color: #3d4a26; }
    .city-badge.moscow { background: #e3b89a; color: #7e3a1a; }
    .meta {
      font-family: var(--font-body);
      font-size: 12px;
      font-style: italic;
      color: var(--ink-soft);
      margin-top: 4px;
    }
    .meta-row {
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink);
      margin-top: 6px;
    }
    .meta-row strong {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-right: 4px;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .actions a, .actions button {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 12px;
      border-radius: var(--radius-pill);
      border: none;
      background: var(--surface);
      color: var(--primary-deep);
      text-decoration: none;
      cursor: pointer;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .actions a:hover, .actions button:hover { transform: translateY(-1px); }

    .empty {
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
      padding: var(--space-7) 0;
      font-size: 14px;
    }

    /* QR overlay — dark photo viewer with carved cavity holding the QR */
    .qr-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20, 14, 8, 0.92);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: var(--space-5);
    }
    .qr-overlay.show { display: flex; }
    .qr-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      text-align: center;
      width: 300px;
      position: relative;
      box-shadow:
        20px 20px 40px rgba(0, 0, 0, 0.4),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
    }
    .qr-box h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: #2f2517;
      margin-bottom: 4px;
    }
    .qr-box p {
      font-family: var(--font-body);
      font-size: 12px;
      font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .qr-box img {
      width: 220px; height: 220px;
      border-radius: var(--radius-md);
      padding: 12px;
      background: #fffaf0;
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.92),
        inset 6px 6px 12px var(--shadow-dark);
    }
    .close-btn {
      position: absolute; top: 12px; right: 14px;
      background: var(--surface-2);
      border: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      color: var(--primary-deep);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }
  </style>
</head>
<body>
  <h1>🪆 Russia WS Students</h1>
  <div class="subtitle">AYBKK Russia WS 2026 — SPB May 1–3 · Moscow May 6–10</div>

  <div class="toolbar">
    <button class="btn ghost active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="btn ghost" data-filter="spb" onclick="setFilter('spb')">SPB</button>
    <button class="btn ghost" data-filter="moscow" onclick="setFilter('moscow')">Moscow</button>
    <button class="btn secondary" onclick="loadStudents()">↻ Refresh</button>
    <button class="btn" onclick="downloadCSV()">⬇ CSV</button>
  </div>

  <div id="count" class="count"></div>
  <div id="list"></div>

  <div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)closeQR()">
    <div class="qr-box">
      <button class="close-btn" onclick="closeQR()">✕</button>
      <h2 id="qrName"></h2>
      <p>Long-press to save</p>
      <img id="qrImg" src="" alt="QR">
    </div>
  </div>

  <script>
    const API = 'https://aybkk-ashtanga.up.railway.app/api';
    let allStudents = [];
    let currentFilter = 'all';

    async function loadStudents() {
      document.getElementById('list').innerHTML = '<div class="empty">Loading...</div>';
      try {
        const res = await fetch(`${API}/orientations/ru`);
        const data = await res.json();
        allStudents = data.students || [];
        render();
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
      }
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('[data-filter]').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
      render();
    }

    function render() {
      const filtered = currentFilter === 'all' ? allStudents : allStudents.filter(s => s.city === currentFilter);
      const cityCounts = { spb: allStudents.filter(s => s.city === 'spb').length, moscow: allStudents.filter(s => s.city === 'moscow').length };
      document.getElementById('count').textContent = `${filtered.length} shown · SPB ${cityCounts.spb} · Moscow ${cityCounts.moscow} · Total ${allStudents.length}`;

      if (!filtered.length) {
        document.getElementById('list').innerHTML = '<div class="empty">No students yet.</div>';
        return;
      }

      document.getElementById('list').innerHTML = filtered.map(s => {
        const initials = (s.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const photo = s.photoUrl
          ? `<img class="photo" src="${s.photoUrl}" alt="${s.name}">`
          : `<div class="photo placeholder">${initials}</div>`;
        const tg = s.telegramUsername ? `@${s.telegramUsername}` : (s.telegramChatId ? `chat ${s.telegramChatId}` : '—');
        const cityKey = s.city || 'spb';
        const cityLabel = cityKey === 'moscow' ? 'Moscow' : 'SPB';
        const link = s.journalLink || '';
        return `<div class="student-card">
          ${photo}
          <div class="info">
            <div class="row1">
              <div class="name">${escapeHtml(s.name || 'Unknown')}</div>
              <span class="city-badge ${cityKey}">${cityLabel}</span>
            </div>
            <div class="meta">${escapeHtml(tg)}${s.size ? ' · ' + escapeHtml(s.size) : ''}${s.experience ? ' · ' + escapeHtml(s.experience) : ''}</div>
            <div class="meta-row"><strong>Email:</strong> ${escapeHtml(s.email || '—')}</div>
            ${s.lastAsana ? `<div class="meta-row"><strong>Last asana:</strong> ${escapeHtml(s.lastAsana)}</div>` : ''}
            ${s.injuries && s.injuries.toLowerCase() !== 'none' && s.injuries !== 'нет' ? `<div class="meta-row"><strong>Injuries:</strong> ${escapeHtml(s.injuries)}</div>` : ''}
            <div class="actions">
              ${link ? `<a href="${link}" target="_blank">Journal ↗</a>` : ''}
              <button onclick="showQR('${s.id}', ${JSON.stringify(s.name || '').replace(/"/g, '&quot;')})">QR</button>
              <button onclick="copyLink('${link}')">Copy link</button>
              ${s.telegramUsername ? `<a href="https://t.me/${s.telegramUsername}" target="_blank">Telegram ↗</a>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function showQR(studentId, name) {
      document.getElementById('qrName').textContent = name;
      document.getElementById('qrImg').src = '';
      document.getElementById('qrOverlay').classList.add('show');
      try {
        const res = await fetch(`${API}/journal/qr/${studentId}`);
        const data = await res.json();
        document.getElementById('qrImg').src = data.qrDataUrl;
      } catch (e) {}
    }

    function closeQR() {
      document.getElementById('qrOverlay').classList.remove('show');
    }

    async function copyLink(link) {
      try { await navigator.clipboard.writeText(link); }
      catch (e) {
        const ta = document.createElement('textarea');
        ta.value = link; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
    }

    function downloadCSV() {
      const url = `${API}/orientations/ru?format=csv${currentFilter !== 'all' ? '&city=' + currentFilter : ''}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = `aybkk-russia-${currentFilter}-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    loadStudents();
  </script>
</body>
</html>
