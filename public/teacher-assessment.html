<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Teacher Assessment — AYBKK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--bg:#FAF9F7;--card:#FFF;--border:#E8E5E0;--text:#1A1A1A;--muted:#8B8680;--accent:#D4A574;--accent-light:#F5EDE4;--accent-hover:#C49564;--success:#6B9E6B;--success-bg:#EEF5EE;--red:#c0392b;--red-bg:#fce4ec;--shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--radius:14px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.header p{font-size:13px;color:var(--muted);margin-top:4px}
.logo{text-align:center;margin-bottom:12px}
.logo img{width:60px;height:60px;border-radius:50%;object-fit:cover;opacity:.85}

/* Student selector */
.student-select{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.student-select label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.student-select select{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;margin-top:8px;background:#fff}
.selected-student{text-align:center;padding:10px;margin-top:10px;background:var(--accent-light);border-radius:var(--radius-sm);font-weight:600;font-size:16px}

/* Journal summary */
.journal-summary{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.journal-summary h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent-hover)}
.j-entry{background:#faf8f5;border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px}
.j-date{font-weight:600;color:var(--accent-hover);margin-bottom:4px}
.j-row{margin-bottom:3px;line-height:1.4}
.j-label{font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.j-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.badge-stable{background:#e8f5e9;color:#2e7d32}
.badge-difficult{background:#fce4ec;color:#c62828}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.section-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title .icon{font-size:16px}

/* Tags */
.tag-group{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none}
.tag.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-hover)}
.tag.weakness.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* Buttons */
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-hover)}
.btn-pass.active{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.btn-hold.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}

input[type=text],textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:13px;font-family:inherit;resize:vertical;margin-top:6px}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}

/* Submit */
.submit-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.submit-btn:hover{background:var(--accent-hover)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* History */
.history-item{background:#faf8f5;border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px;line-height:1.4}
.history-date{font-weight:600;color:var(--accent-hover);margin-bottom:4px}
.history-row{margin-bottom:2px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;display:none;z-index:100}

/* Success overlay */
.success-overlay{position:fixed;inset:0;background:rgba(250,249,247,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;display:none}
.success-overlay .icon{font-size:48px;margin-bottom:16px}
.success-overlay h2{font-size:18px;margin-bottom:8px}
.success-overlay p{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="container">

<div class="logo"><img src="https://aybkk-ashtanga.up.railway.app/logo.png" onerror="this.style.display='none'" alt="AYBKK"></div>
<div class="header">
  <h1>Teacher Assessment</h1>
  <p>Record student progress after class</p>
</div>

<!-- Student Selector -->
<div class="student-select">
  <label>Select Student</label>
  <select id="studentSelect" onchange="selectStudent()">
    <option value="">— Choose a student —</option>
  </select>
  <div class="selected-student" id="selectedStudent" style="display:none"></div>
</div>

<!-- Journal Summary (shown when student selected) -->
<div class="journal-summary" id="journalSection" style="display:none">
  <h3>📖 Recent Journal Entries</h3>
  <div id="journalEntries"></div>
</div>

<!-- Assessment Form (shown when student selected) -->
<div id="assessmentForm" style="display:none">

  <!-- Energy Level -->
  <div class="card">
    <div class="section-title"><span class="icon">⚡</span> Energy Level</div>
    <div class="btn-group" id="energyGroup">
      <button type="button" class="btn" data-field="energy" data-value="high">🔴 High</button>
      <button type="button" class="btn" data-field="energy" data-value="medium">🟡 Medium</button>
      <button type="button" class="btn" data-field="energy" data-value="low">⚪ Low</button>
    </div>
  </div>

  <!-- Practice Behavior -->
  <div class="card">
    <div class="section-title"><span class="icon">🌊</span> Practice Flow</div>
    <div class="btn-group" id="flowGroup">
      <button type="button" class="btn" data-field="behavior" data-value="proper_vinyasa">🟢 Good Flow</button>
      <button type="button" class="btn" data-field="behavior" data-value="rest_often">🟡 Interrupted</button>
      <button type="button" class="btn" data-field="behavior" data-value="too_much_distractions">🔴 Rough</button>
    </div>
  </div>

  <!-- Strengths -->
  <div class="card">
    <div class="section-title"><span class="icon">💪</span> Strengths</div>
    <div class="tag-group" id="strengthsTags"></div>
  </div>

  <!-- Weaknesses -->
  <div class="card">
    <div class="section-title"><span class="icon">📌</span> Weaknesses</div>
    <div class="tag-group" id="weaknessesTags"></div>
  </div>

  <!-- Last Asana -->
  <div class="card">
    <div class="section-title"><span class="icon">🧘</span> Last Asana</div>
    <input type="text" id="lastAsana" placeholder="e.g., Marichyasana C">
    <div class="btn-group" id="passGroup" style="margin-top:8px">
      <button type="button" class="btn btn-pass" data-field="lastAsanaPass" data-value="true">✅ PASS</button>
      <button type="button" class="btn btn-hold" data-field="lastAsanaPass" data-value="false">⏸️ HOLD</button>
    </div>
  </div>

  <!-- To Fix -->
  <div class="card">
    <div class="section-title"><span class="icon">🎯</span> To Fix Now</div>
    <textarea id="toFix" rows="2" placeholder="What should the student focus on next?"></textarea>
  </div>

  <!-- Teacher Notes -->
  <div class="card">
    <div class="section-title"><span class="icon">📝</span> Your Notes</div>
    <textarea id="teacherNotes" rows="3" placeholder="Overall observation, encouragement, specific feedback..."></textarea>
  </div>

  <button class="submit-btn" onclick="saveAssessment()">💾 Save Assessment</button>
  <button class="submit-btn" onclick="saveAndSend()" style="background:var(--success);margin-top:8px">📤 Save & Send to Student</button>
</div>

<!-- Assessment History -->
<div id="historySection" style="display:none;margin-top:16px">
  <h3 style="font-size:14px;font-weight:600;margin-bottom:10px">📋 Assessment History</h3>
  <div id="historyList"></div>
</div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Success -->
<div id="successOverlay" class="success-overlay">
  <div class="icon">✅</div>
  <h2>Assessment Saved</h2>
  <p id="successMsg">Click to continue</p>
  <button class="submit-btn" style="max-width:200px;margin-top:16px" onclick="hideSuccess()">OK</button>
</div>

<script>
// ============ DATA ============
let students = [];
let allCheckins = {};
let formData = { energy: '', behavior: '', lastAsanaPass: '', strengths: [], weaknesses: [] };

const defaultTags = {
  strengths: ['Bandha', 'Breath', 'Balance', 'Flexibility', 'Strength', 'Focus', 'Patience', 'Jump Through', 'Jump Back', 'Headstand', 'Backbending', 'Hip Opening', 'Consistency', 'Confidence', 'Awareness'],
  weaknesses: ['Bandha', 'Breath', 'Balance', 'Flexibility', 'Strength', 'Focus', 'Chaturanga', 'Jump Back', 'Jump Through', 'Leg Behind Head', 'Backbending', 'Hip Opening', 'Hamstring', 'Core', 'Shoulder Stability', 'Body Control', 'Nervousness', 'Movement Mechanics']
};

// ============ INIT ============
document.addEventListener('DOMContentLoaded', async () => {
  await loadStudents();
  renderTags('strengths');
  renderTags('weaknesses');
  setupButtonGroups();
});

// ============ LOAD STUDENTS ============
async function loadStudents() {
  const params = new URLSearchParams(window.location.search);
  const days = params.get('days') || '30';
  
  const res = await fetch(`/api/journal/history/${days}`);
  const data = await res.json();
  const checkins = data.history || [];
  
  // Group by student
  const studentMap = {};
  checkins.forEach(c => {
    const name = c.studentName;
    if (!name || name === 'Test Workshop Student' || name === '测试学生') return;
    if (!studentMap[name]) studentMap[name] = { name, id: c.studentId, entries: [] };
    studentMap[name].entries.push(c);
  });
  
  students = Object.values(studentMap).sort((a, b) => a.name.localeCompare(b.name));
  
  // Populate dropdown
  const select = document.getElementById('studentSelect');
  students.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.name} (${s.entries.length} entries)`;
    select.appendChild(opt);
  });
}

// ============ SELECT STUDENT ============
async function selectStudent() {
  const select = document.getElementById('studentSelect');
  const studentId = select.value;
  if (!studentId) {
    document.getElementById('selectedStudent').style.display = 'none';
    document.getElementById('journalSection').style.display = 'none';
    document.getElementById('assessmentForm').style.display = 'none';
    document.getElementById('historySection').style.display = 'none';
    return;
  }
  
  const student = students.find(s => s.id === studentId);
  if (!student) return;
  
  document.getElementById('selectedStudent').textContent = student.name;
  document.getElementById('selectedStudent').style.display = 'block';
  document.getElementById('journalSection').style.display = 'block';
  document.getElementById('assessmentForm').style.display = 'block';
  
  renderJournalEntries(student.entries);
  loadHistory(studentId);
}

function renderJournalEntries(entries) {
  const container = document.getElementById('journalEntries');
  container.innerHTML = entries.slice(0, 10).map(e => {
    const stable = (e.stableToday || []).map(t => `<span class="badge badge-stable">${translateTag(t)}</span>`).join('');
    const difficult = (e.difficultToday || []).map(t => `<span class="badge badge-difficult">${translateTag(t)}</span>`).join('');
    
    return `<div class="j-entry">
      <div class="j-date">${fmtDate(e.checkedInAt)} · ${e.platform || 'web'}</div>
      <div class="j-row"><span class="j-label">Vinyasa:</span> ${translateVinyasa(e.vinyasa)} · <span class="j-label">Bandha:</span> ${translateBandha(e.bandha)}</div>
      ${e.lastAsanaNote ? `<div class="j-row"><span class="j-label">Last Asana:</span> ${e.lastAsanaNote}</div>` : ''}
      ${e.practiceNotes ? `<div class="j-row"><span class="j-label">Notes:</span> ${e.practiceNotes}</div>` : ''}
      ${stable || difficult ? `<div class="j-badges">${stable}${difficult}</div>` : ''}
    </div>`;
  }).join('');
}

// ============ ASSESSMENT HISTORY ============
async function loadHistory(studentId) {
  try {
    const res = await fetch(`/api/journal/comments/${studentId}`);
    const data = await res.json();
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    
    if (data.comment) {
      section.style.display = 'block';
      list.innerHTML = `<div class="history-item">
        <div class="history-date">${fmtDate(data.updatedAt)}</div>
        <div>${data.comment}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">— ${data.teacherName || 'Boonchu'}</div>
      </div>`;
    } else {
      section.style.display = 'none';
    }
  } catch {}
}

// ============ TAGS ============
function renderTags(type) {
  const container = document.getElementById(type + 'Tags');
  const tagList = defaultTags[type];
  container.innerHTML = tagList.map(t => 
    `<span class="tag ${type === 'weaknesses' ? 'weakness' : ''}" data-type="${type}" data-value="${t}" onclick="toggleTag(this,'${type}','${t}')">${t}</span>`
  ).join('');
}

function toggleTag(el, type, value) {
  el.classList.toggle('active');
  if (el.classList.contains('active')) formData[type].push(value);
  else formData[type] = formData[type].filter(v => v !== value);
}

// ============ BUTTON GROUPS ============
function setupButtonGroups() {
  ['energyGroup', 'flowGroup', 'passGroup'].forEach(groupId => {
    const group = document.getElementById(groupId);
    if (!group) return;
    group.addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      group.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      formData[btn.dataset.field] = btn.dataset.value;
    });
  });
}

// ============ SAVE ============
async function saveAssessment() {
  const select = document.getElementById('studentSelect');
  const studentId = select.value;
  if (!studentId) return;
  
  const student = students.find(s => s.id === studentId);
  const comment = document.getElementById('teacherNotes').value.trim() || document.getElementById('toFix').value.trim();
  if (!comment) { showToast('Please write some notes first'); return; }
  
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  
  try {
    // Save as comment (existing API)
    await fetch('/api/journal/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        studentId,
        comment: buildFullComment(),
        teacherName: 'Boonchu'
      })
    });
    
    showToast('Saved ✓');
    btn.disabled = false;
    btn.textContent = '💾 Save Assessment';
    loadHistory(studentId);
  } catch (e) {
    showToast('Error saving');
    btn.disabled = false;
    btn.textContent = '💾 Save Assessment';
  }
}

async function saveAndSend() {
  await saveAssessment();
  const studentId = document.getElementById('studentSelect').value;
  const student = students.find(s => s.id === studentId);
  if (!student) return;
  
  const url = `https://aybkk-ashtanga.up.railway.app/student.html?studentId=${studentId}`;
  try {
    await navigator.clipboard.writeText(url);
    showSuccess(`Assessment saved! Student link copied to clipboard.`);
  } catch {
    showSuccess(`Assessment saved for ${student.name}`);
  }
}

function buildFullComment() {
  const parts = [];
  if (formData.energy) parts.push(`Energy: ${formData.energy}`);
  if (formData.behavior) parts.push(`Flow: ${formData.behavior}`);
  if (formData.strengths.length) parts.push(`Strengths: ${formData.strengths.join(', ')}`);
  if (formData.weaknesses.length) parts.push(`Weaknesses: ${formData.weaknesses.join(', ')}`);
  if (document.getElementById('lastAsana').value) parts.push(`Last Asana: ${document.getElementById('lastAsana').value} (${formData.lastAsanaPass === 'true' ? 'PASS' : formData.lastAsanaPass === 'false' ? 'HOLD' : ''})`);
  if (document.getElementById('toFix').value) parts.push(`To Fix: ${document.getElementById('toFix').value}`);
  if (document.getElementById('teacherNotes').value) parts.push(`Notes: ${document.getElementById('teacherNotes').value}`);
  return parts.join('\n');
}

// ============ UI ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
function showSuccess(msg) {
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('successOverlay').style.display = 'flex';
}
function hideSuccess() {
  document.getElementById('successOverlay').style.display = 'none';
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}
function translateTag(t) {
  const m = {jump_back:'Jump Back',jump_through:'Jump Through',twisting:'Twisting',leg_behind_head:'Leg Behind Head',backbending:'Backbending',arm_balance:'Arm Balance',inversion:'Inversion',bandha:'Bandha',hip_legs:'Hip/Legs',arms_shoulders:'Arms/Shoulders',standing_balance:'Standing Balance',chaturanga:'Chaturanga',breathing:'Breathing',lifting_body:'Lifting Body',forward_bend:'Forward Bend',body_ache_pain:'Body Ache'};
  return m[t]||t;
}
function translateVinyasa(v) {
  const m={kept_moving:'Kept Moving',stop_breathe:'Stop & Breathe',tired_paused:'Tired/Paused'};
  return m[v]||v;
}
function translateBandha(b) {
  const m={body_light:'Body Light',finding_light:'Finding Light',heavy_body:'Heavy Body'};
  return m[b]||b;
}
</script>
</body>
</html>
