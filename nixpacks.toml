# --ignore-scripts skips all postinstall hooks (incl. cloudflared binary download)
# so npm install always succeeds. We download cloudflared binary separately.
[phases.install]
cmds = [
  "npm install --ignore-scripts",
  "curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ./cloudflared && chmod +x ./cloudflared && echo '[nixpacks] cloudflared binary ready' || echo '[nixpacks] WARNING: cloudflared binary download failed, tunnel will be disabled'"
]
