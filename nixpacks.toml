# Railway/nixpacks build config.
# cloudflared was removed from package.json (binary is downloaded here instead,
# because its npm postinstall was failing and breaking `npm install`).
# 'cloudflared-bin' is NOT in .gitignore (only 'cloudflared' is), so it
# survives into the Docker image and the server finds it at startup.
[phases.setup]
nixPkgs = ["curl"]

[phases.install]
cmds = [
  "npm install",
  "curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared-bin && chmod +x cloudflared-bin && echo '[nixpacks] cloudflared-bin ready' || echo '[nixpacks] WARNING: cloudflared download failed — will try at runtime'"
]
