<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYBKK — Student Faces</title>
<link rel="stylesheet" href="/tokens.css">
<style>
/* faces.html — student photo gallery (admin). Beech/walnut palette,
   raised wood cards, carved-cavity photo wells. */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: var(--surface);
  padding: var(--space-5) var(--space-4) var(--space-4);
  text-align: center;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid var(--shadow-dark);
}
.header h1 {
  font-family: var(--font-display);
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 800;
  letter-spacing: -0.012em;
  color: #2f2517;
  text-shadow: var(--text-carve-soft);
  margin-bottom: 4px;
}
.header .sub {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
  color: var(--ink-soft);
}
.filter-bar {
  display: flex; gap: 8px;
  padding: var(--space-3) var(--space-4);
  background: var(--bg);
  border-bottom: 1px solid var(--shadow-dark);
  position: sticky; top: 84px; z-index: 9;
  overflow-x: auto;
}
.filter-btn {
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  border: none;
  background: var(--surface);
  color: var(--ink-soft);
  font-family: var(--font-display);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  box-shadow:
    4px 4px 8px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
  transition: transform var(--dur-base) var(--ease-spring);
}
.filter-btn.active {
  background: var(--surface-2);
  color: var(--primary-deep);
  box-shadow:
    inset 3px 3px 0 rgba(150, 120, 80, 0.18),
    inset -2px -2px 0 rgba(253, 250, 242, 0.85),
    inset 5px 5px 10px var(--shadow-dark);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: var(--space-3);
  padding: var(--space-4);
  max-width: 900px; margin: 0 auto;
}

/* Card — raised beech block with carved photo cavity */
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  display: block;
  color: inherit;
  text-decoration: none;
  box-shadow:
    8px 8px 18px var(--shadow-dark),
    -4px -4px 10px var(--shadow-light);
  transition: transform var(--dur-base) var(--ease-spring);
}
.card:hover { transform: translateY(-2px); }
.card:active { transform: translateY(0); }
a.card:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 3px; }
.card.has-photo {
  box-shadow:
    8px 8px 18px var(--shadow-dark),
    -4px -4px 10px var(--shadow-light),
    0 0 0 2px var(--accent);
}

/* Photo-box — carved cavity holding the photo */
.photo-box {
  width: 100%; aspect-ratio: 1;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  box-shadow:
    inset 3px 3px 0 rgba(150, 120, 80, 0.18),
    inset -2px -2px 0 rgba(253, 250, 242, 0.7);
}
.photo-box img {
  width: 100%; height: 100%; object-fit: cover;
}
.photo-placeholder {
  font-size: 44px;
  color: var(--accent);
  opacity: 0.4;
}
.no-photo-label {
  position: absolute; bottom: 6px; left: 0; right: 0;
  text-align: center;
  font-family: var(--font-display);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.card-info {
  padding: 10px 12px 12px;
}
.card-en {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-zh {
  font-family: var(--font-body);
  font-size: 12px;
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.card-meta {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--ink-soft);
}
.card-city {
  display: inline-block;
  background: var(--surface-2);
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-family: var(--font-display);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--primary-deep);
  box-shadow:
    inset 1px 1px 2px var(--shadow-dark),
    inset -1px -1px 2px var(--shadow-light);
}
.loading {
  text-align: center;
  padding: var(--space-7) var(--space-5);
  font-family: var(--font-body);
  font-style: italic;
  color: var(--accent);
  font-size: 15px;
}
.empty {
  text-align: center;
  padding: var(--space-7) var(--space-5);
  font-family: var(--font-body);
  font-style: italic;
  color: var(--ink-soft);
}
.count-bar {
  padding: 8px var(--space-4);
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--primary-deep);
  text-align: center;
}
.photo-count {
  display: inline-block;
  margin-left: 8px;
  background: linear-gradient(135deg, #b89878, var(--accent));
  color: #fdf6e6;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em;
  box-shadow: 3px 3px 8px rgba(110, 85, 55, 0.30);
}
.refresh-btn {
  position: fixed; bottom: 20px; right: 20px;
  background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
  color: #f1e2c4;
  border: none;
  width: 56px; height: 56px;
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
  text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.6), -1px -1px 1px rgba(50, 28, 10, 0.6);
  box-shadow:
    10px 10px 22px rgba(120, 80, 40, 0.40),
    -4px -4px 10px var(--shadow-light),
    inset 3px 3px 6px rgba(255, 240, 215, 0.5);
  transition: transform var(--dur-base) var(--ease-spring);
}
.refresh-btn:hover { transform: translateY(-3px) scale(1.05); }

.view-switch {
  display: flex; gap: 8px;
  padding: var(--space-4) var(--space-4) 4px;
  max-width: 900px; margin: 0 auto;
}
.view-tab {
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  background: var(--surface);
  border: none;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-decoration: none;
  cursor: pointer;
  box-shadow:
    4px 4px 8px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
  transition: transform var(--dur-base) var(--ease-spring);
}
.view-tab:active { transform: scale(0.97); }
.view-tab.active {
  background: var(--surface-2);
  color: var(--primary-deep);
  box-shadow:
    inset 3px 3px 0 rgba(150, 120, 80, 0.18),
    inset -2px -2px 0 rgba(253, 250, 242, 0.85),
    inset 5px 5px 10px var(--shadow-dark);
}
.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%     { opacity: .5; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Student Faces</h1>
  <div class="sub" id="headerSub">Loading...</div>
</div>

<div class="view-switch">
  <a class="view-tab" href="/student-report.html">📋 Reports</a>
  <a class="view-tab active" href="/faces.html" aria-current="page">📸 Faces grid</a>
  <a class="view-tab" href="/mindmap.html" title="Asana ↔ body reference (work in progress)">🧠 Knowledge</a>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-f="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-f="huizhou" onclick="setFilter('huizhou')">Huizhou</button>
  <button class="filter-btn" data-f="guangzhou" onclick="setFilter('guangzhou')">Guangzhou</button>
  <button class="filter-btn" data-f="indepth" onclick="setFilter('indepth')">In-Depth</button>
  <button class="filter-btn" data-f="bangkok" onclick="setFilter('bangkok')">Bangkok</button>
  <button class="filter-btn" data-f="spb" onclick="setFilter('spb')">🇷🇺 SPB</button>
  <button class="filter-btn" data-f="moscow" onclick="setFilter('moscow')">🇷🇺 Moscow</button>
  <button class="filter-btn" data-f="photo" onclick="setFilter('photo')">📷 Photo</button>
  <button class="filter-btn" data-f="nophoto" onclick="setFilter('nophoto')">No Photo</button>
</div>

<div class="count-bar" id="countBar">&nbsp;</div>

<div class="grid" id="grid">
  <div class="loading pulse">Loading students...</div>
</div>

<button class="refresh-btn" onclick="load()" title="Refresh">↻</button>

<script>
let allStudents = [];
let currentFilter = 'all';

function isGuangzhou(s) {
  return s.location === 'guangzhou' || (s.id && s.id.startsWith('gz-'));
}
function isInDepth(s) {
  return s.classType === 'in-depth-mysore-cn2';
}
function isRussia(s) {
  return s.location === 'russia' || (s.id && s.id.startsWith('ru-'));
}
function isHuizhou(s) {
  if (isGuangzhou(s) || isInDepth(s) || isRussia(s)) return false;
  return s.location === 'huizhou'
      || s.isChineseStudent === true
      || s.classType === 'chinese-workshop'
      || s.classType === 'huizhou';
}
function isBangkok(s) {
  if (isRussia(s) || isGuangzhou(s) || isHuizhou(s) || isInDepth(s)) return false;
  return s.location === 'bangkok' || s.classType === 'shala-regular';
}

// Map a student to the location param expected by /student.html.
function locationFor(s) {
  if (isRussia(s))    return 'russia';
  if (isGuangzhou(s)) return 'guangzhou';
  if (isInDepth(s))   return 'huizhou';
  if (isHuizhou(s))   return 'huizhou';
  if (isBangkok(s))   return 'bangkok';
  return s.location || 'bangkok';
}
function langFor(s) {
  if (isRussia(s)) return 'ru';
  if (isGuangzhou(s) || isHuizhou(s) || isInDepth(s)) return 'zh';
  return 'en';
}
function journalUrlFor(s) {
  if (s.journalLink) return s.journalLink;
  if (!s.id) return null;
  const params = new URLSearchParams({
    id: s.id,
    name: s.name || s.englishName || '',
    lang: langFor(s),
    location: locationFor(s),
  });
  return `/student.html?${params.toString()}`;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.f === f);
  });
  render();
}

function filtered() {
  if (currentFilter === 'huizhou')   return allStudents.filter(isHuizhou);
  if (currentFilter === 'guangzhou') return allStudents.filter(isGuangzhou);
  if (currentFilter === 'indepth')   return allStudents.filter(isInDepth);
  if (currentFilter === 'bangkok')   return allStudents.filter(isBangkok);
  if (currentFilter === 'spb')       return allStudents.filter(s => isRussia(s) && s.city === 'spb');
  if (currentFilter === 'moscow')    return allStudents.filter(s => isRussia(s) && s.city === 'moscow');
  if (currentFilter === 'photo')     return allStudents.filter(s => s.photoUrl);
  if (currentFilter === 'nophoto')   return allStudents.filter(s => !s.photoUrl);
  return allStudents;
}

function render() {
  const students = filtered();
  const withPhoto = students.filter(s => s.photoUrl).length;

  document.getElementById('countBar').innerHTML =
    `${students.length} student${students.length!==1?'s':''} &nbsp;` +
    `<span class="photo-count">📷 ${withPhoto} with photo</span>`;

  document.getElementById('headerSub').textContent =
    `${withPhoto} of ${students.length} photos uploaded`;

  if (!students.length) {
    document.getElementById('grid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">No students found.</div>';
    return;
  }

  // Sort: photos first, then alphabetical by English name
  const sorted = [...students].sort((a,b) => {
    if (a.photoUrl && !b.photoUrl) return -1;
    if (!a.photoUrl && b.photoUrl) return 1;
    return (a.englishName||a.name||'').localeCompare(b.englishName||b.name||'');
  });

  document.getElementById('grid').innerHTML = sorted.map(s => {
    const name = s.englishName || s.name || '—';
    const zh   = s.chineseName || (s.englishName ? s.name : '');
    const badge = badgeFor(s);
    const hasPhoto = !!s.photoUrl;
    const url = journalUrlFor(s);

    const photoHtml = hasPhoto
      ? `<img src="${esc(s.photoUrl)}" alt="${esc(name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'>🧘</div><div class=\\'no-photo-label\\'>Photo error</div>'">`
      : `<div class="photo-placeholder">🧘</div><div class="no-photo-label">Awaiting photo</div>`;

    const cardInner = `
      <div class="photo-box">${photoHtml}</div>
      <div class="card-info">
        <div class="card-en">${esc(name)}</div>
        ${zh ? `<div class="card-zh">${esc(zh)}</div>` : ''}
        ${badge ? `<div><span class="card-city">${badge}</span></div>` : ''}
      </div>`;

    if (url) {
      return `<a class="card ${hasPhoto?'has-photo':''}" href="${esc(url)}" title="${esc(name)}${zh?' · '+esc(zh):''} — open journal">${cardInner}</a>`;
    }
    return `<div class="card ${hasPhoto?'has-photo':''}" title="${esc(name)}${zh?' · '+esc(zh):''}">${cardInner}</div>`;
  }).join('');
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function badgeFor(s) {
  if (isRussia(s))    return s.city === 'moscow' ? '🇷🇺 Moscow' : '🇷🇺 SPB';
  if (isInDepth(s))   return 'In-Depth';
  if (isGuangzhou(s)) return 'Guangzhou';
  if (isHuizhou(s))   return 'Huizhou';
  if (isBangkok(s))   return 'Bangkok';
  return s.classType || s.location || '';
}

async function load() {
  try {
    const r = await fetch('/api/students');
    const data = await r.json();

    // Handle { students: [...] } wrapper or plain array
    const arr = Array.isArray(data) ? data : (data.students || []);
    if (!arr.length && data.error) {
      document.getElementById('grid').innerHTML =
        `<div class="empty" style="grid-column:1/-1">API error: ${data.error}</div>`;
      return;
    }

    allStudents = arr;
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1">Network error: ${e.message}</div>`;
  }
}

load();
// Auto-refresh every 30s — photos come in throughout the day
setInterval(load, 30000);
</script>

</body>
</html>
