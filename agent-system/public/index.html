<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes — AYBKK Builder</title>
  <style>
    :root { --ink:#1f2421; --paper:#f7f5f0; --accent:#b5651d; --line:#e2ddd2; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
           color:var(--ink); background:var(--paper); line-height:1.5; }
    header { padding:2.5rem 1.5rem 1.5rem; background:#fff; border-bottom:1px solid var(--line); }
    header h1 { margin:0 0 .25rem; }
    header p { margin:0; color:#5c5c54; }
    main { max-width:50rem; margin:0 auto; padding:1.5rem; }
    form { display:grid; gap:.75rem; }
    label { font-weight:600; font-size:.9rem; display:grid; gap:.25rem; }
    textarea, input { padding:.7rem; border:1px solid var(--line); border-radius:8px; font:inherit; background:#fff; }
    textarea { min-height:5rem; }
    button { padding:.75rem 1.3rem; border:none; border-radius:8px; background:var(--accent);
             color:#fff; font-weight:600; cursor:pointer; justify-self:start; }
    button:disabled { opacity:.6; cursor:wait; }
    .examples { margin:.5rem 0 0; font-size:.85rem; color:#5c5c54; }
    .examples button { background:none; color:var(--accent); border:1px solid var(--line);
                       padding:.3rem .6rem; border-radius:999px; margin:.2rem .2rem 0 0; font-weight:600; }
    #result { margin-top:1.5rem; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:1.2rem; }
    .card h3 { margin:0 0 .5rem; }
    .files { font-family:ui-monospace,Menlo,monospace; font-size:.85rem; background:#fafafa;
             border:1px solid var(--line); border-radius:8px; padding:.6rem .8rem; }
    .tag { display:inline-block; background:#f0ece2; border-radius:999px; padding:.15rem .6rem;
           font-size:.8rem; margin:.15rem .25rem 0 0; }
    .err { color:#c0392b; font-weight:600; }
  </style>
</head>
<body>
  <header>
    <h1>Hermes</h1>
    <p>Describe what you need for Ashtanga Yoga Bangkok. The agents will build it.</p>
  </header>
  <main>
    <form id="task-form">
      <label>What should we build?
        <textarea id="description" placeholder="Build a simple booking system for yoga classes" required></textarea>
      </label>
      <label>Client / student (optional — Hermes remembers context per client)
        <input id="client" placeholder="e.g. Jane" />
      </label>
      <div class="examples">
        Try:
        <button type="button" data-ex="Build a simple booking system for yoga classes">booking system</button>
        <button type="button" data-ex="Create a landing page for a 10-day beginner workshop">workshop landing page</button>
        <button type="button" data-ex="Make a contact form for private class enquiries">contact form</button>
      </div>
      <button type="submit" id="go">Build it</button>
    </form>
    <div id="result"></div>
  </main>

  <script>
    const form = document.getElementById('task-form');
    const result = document.getElementById('result');
    const go = document.getElementById('go');

    document.querySelectorAll('.examples button').forEach((b) => {
      b.addEventListener('click', () => { document.getElementById('description').value = b.dataset.ex; });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const description = document.getElementById('description').value.trim();
      const client = document.getElementById('client').value.trim();
      if (!description) return;
      go.disabled = true;
      result.innerHTML = '<p>Building… delegating to the agents.</p>';
      try {
        const res = await fetch('/api/task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description, client }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Build failed');
        const agents = data.agentsUsed.map((a) => '<span class="tag">' + a + '</span>').join('');
        const files = data.files.map((f) => '- ' + f).join('\n');
        result.innerHTML =
          '<div class="card">' +
          '<h3>' + data.slug + ' <small>(' + data.projectType + ')</small></h3>' +
          '<p>Backend: <strong>' + data.executor + '</strong> &middot; ' + data.tookMs + 'ms</p>' +
          '<p>Agents: ' + agents + '</p>' +
          '<p>Output: <code>' + data.relDir + '</code></p>' +
          '<pre class="files">' + files + '</pre>' +
          (data.projectType === 'booking-system'
            ? '<p>Run it: <code>cd ' + data.relDir + ' &amp;&amp; npm install &amp;&amp; node server.js</code></p>'
            : '') +
          '</div>';
      } catch (err) {
        result.innerHTML = '<p class="err">' + err.message + '</p>';
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
