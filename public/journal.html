<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AYBKK Student Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 18px; color: #1a1a1a; margin-bottom: 16px; text-align: center; }
    
    /* Main tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; background: #fff; padding: 4px; border-radius: 12px; }
    .tab { flex: 1; padding: 10px 8px; text-align: center; cursor: pointer; font-size: 13px; border-radius: 8px; border: none; background: transparent; color: #666; }
    .tab.active { background: #4CAF50; color: #fff; }
    
    /* Sub tabs (location filter) */
    .sub-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .sub-tab { flex: 1; padding: 8px 6px; text-align: center; cursor: pointer; font-size: 12px; border-radius: 8px; border: 1.5px solid #ddd; background: #fff; color: #666; }
    .sub-tab.active { background: #E8F5E9; color: #2E7D32; border-color: #4CAF50; font-weight: 600; }
    
    /* Cards */
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
    
    /* Student List */
    .student-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
    .student-item:last-child { border-bottom: none; }
    .student-item .info { flex: 1; }
    .student-item .name { font-weight: 600; font-size: 15px; color: #1a1a1a; }
    .student-item .meta { font-size: 12px; color: #888; margin-top: 2px; }
    .student-item .qr-btn { 
      background: #4CAF50; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; 
      font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; margin-left: 12px;
    }
    
    /* QR Modal */
    .qr-modal { 
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
      background: #fff; z-index: 1000; text-align: center; padding: 20px;
    }
    .qr-modal.show { display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .qr-modal .close-btn { 
      position: absolute; top: 16px; right: 16px; background: #f5f5f5; border: none; 
      width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer;
    }
    .qr-modal .student-name { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .qr-modal .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    .qr-modal .qr-container { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .qr-modal img { width: 250px; height: 250px; }
    .qr-modal .hint { font-size: 12px; color: #888; margin-top: 16px; }
    
    /* History */
    .history-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .history-name { font-weight: 600; font-size: 15px; }
    .history-time { font-size: 11px; color: #888; }
    .history-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .history-item { background: #f9f9f9; padding: 8px 10px; border-radius: 6px; font-size: 12px; }
    .history-item .label { color: #888; font-size: 10px; }
    .history-item .value { font-weight: 500; margin-top: 2px; }
    .history-text { margin-top: 8px; font-size: 12px; color: #666; }
    
    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; }
    
    /* Empty state */
    .empty { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    
    /* Badge */
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-left: 4px; }
    .badge-huizhou { background: #FFF3E0; color: #E65100; }
    .badge-bangkok { background: #E3F2FD; color: #1565C0; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: #888; }
    
    /* Tab content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Count */
    .count { text-align: center; font-size: 12px; color: #999; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📖 AYBKK Student Journal</h1>
    
    <div class="tabs">
      <button class="tab active" onclick="showMainTab('students')">👥 Students</button>
      <button class="tab" onclick="showMainTab('history')">📊 Check-ins</button>
    </div>
    
    <!-- Students Tab -->
    <div id="tab-students" class="tab-content active">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="showLocation('huizhou')">🍊 Huizhou</button>
        <button class="sub-tab" onclick="showLocation('bangkok')">🏙️ Bangkok</button>
        <button class="sub-tab" onclick="showLocation('all')">📋 All</button>
      </div>
      <div id="studentsList"><div class="loading">Loading students...</div></div>
    </div>
    
    <!-- History Tab -->
    <div id="tab-history" class="tab-content">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="showHistoryLocation('huizhou')">🍊 Huizhou</button>
        <button class="sub-tab" onclick="showHistoryLocation('bangkok')">🏙️ Bangkok</button>
        <button class="sub-tab" onclick="showHistoryLocation('all')">📋 All</button>
      </div>
      <div class="filters">
        <select id="filterDays" onchange="loadHistory()">
          <option value="1">Today</option>
          <option value="3">Last 3 Days</option>
          <option value="7" selected>Last 7 Days</option>
          <option value="23">Full Workshop</option>
          <option value="30">Last 30 Days</option>
        </select>
      </div>
      <div id="historyList"><div class="loading">Loading...</div></div>
    </div>
  </div>
  
  <!-- QR Modal -->
  <div id="qrModal" class="qr-modal">
    <button class="close-btn" onclick="closeQR()">✕</button>
    <div class="student-name" id="qrStudentName"></div>
    <div class="subtitle">Scan to fill practice journal</div>
    <div class="qr-container">
      <img id="qrImage" src="" alt="QR Code">
    </div>
    <div class="hint">Students open link → save to phone → fill after practice</div>
  </div>

  <script>
    // Huizhou student IDs (from workshop-qr-urls.md)
    const HUIZHOU_IDS = [
      '823a0c35-2ebd-4651-b6a3-027c9a41ce41', // 马儿
      '829e51c6-b4fd-4a5f-b70f-45025c93a366', // 权哥
      '9b4c3922-e063-4dce-97a0-c8225b12adfe', // 嘉芬
      'dab9badc-a7fc-4434-b99c-615823aff389', // 老谢
      'c3d063b4-14d9-4030-b41b-29cdbbfafc18', // 陈云
      '9b5cda78-681e-4a4b-b567-0953c3bc0c9d', // 刘建梅
      '5b7b526b-8a52-4258-8c6a-9e91d33e7d9c', // Maggie
      '4a3ec6bf-ad9c-4e29-a66c-4b64bcbb144d', // 郑莉
      'b9374595-c94a-4742-bb76-31eb232cbbc4', // 萍姐
      'd5e274a2-4170-4bad-87ef-e2e88f81356f', // 丽君
      'a3488eb9-6a51-4710-a15a-7b329acf70c4', // 华姐
      'e9865ce2-18f0-4621-84a2-a32f72068d60', // 吉吉
      '64111735-daf0-4ef1-ac6d-eb18382daae2', // 白姐
      'ed932971-7874-474f-89c4-08f57f4c913d', // 小辣椒
      '518fb95f-990c-41c3-9bdd-2cd440615249', // 邢晨晨
      'e49bf4a2-cf3b-4de0-9b94-7c4e0f460cf7', // 汪晓红
      '98dae66e-72c2-41a3-bb01-2e42218e7803', // Smile
      'bd3fa653-bb43-48ac-9683-fbbc85b423ba', // 老聂
      'db5b1a8a-b4fa-4d3f-ad08-872a930e277b', // 李蓉君
      '934a1599-c69c-4e96-9b58-691707124891', // 歆芝Zia
      '8feaa2f8-4d09-4a31-bb78-c0e17c2b1d9f', // 骆文
      'fc8e0d85-0b55-4ac2-bf9f-a7624f236780', // 隋洪乙
      'ea13f12c-4f43-4480-975b-584ad353cf8c', // 乔乔
      '9a24e2cc-1257-43e5-aca3-09139dca0d1b', // Amy Beibei
      '16756991-fed2-469f-9d2c-19d934fc17af', // Edison Hu
    ];

    const vinyasaEmoji = { kept_moving: '🟢', stop_breathe: '🟡', tired_paused: '🔴' };
    const vinyasaLabel = { kept_moving: 'Kept moving', stop_breathe: 'Stopped to breathe', tired_paused: 'Tired, had to pause' };
    const bandhaEmoji = { body_light: '🟢', finding_light: '🟡', heavy_body: '🔴' };
    const bandhaLabel = { body_light: 'Body feels light', finding_light: 'Finding lightness', heavy_body: 'Heavy body' };
    const asanaEmoji = {
      jump_back: '↩️ Jump back', jump_through: '↪️ Jump through',
      arms_shoulders: '💪 Arms & shoulders', backbending: '🌉 Backbending',
      leg_behind_head: '🦵 Leg behind head', arm_balance: '🤸 Arm balance',
      inversion: '🙃 Inversion', bandha: '✨ Bandha', hip_legs: '🦵 Hip & legs',
      chaturanga: '🔴 Chaturanga', forward_bend: '🔴 Forward bend',
      twisting: '🔴 Twisting', standing_balance: '🔴 Standing balance',
      breathing: '🫁 Breathing', lifting_body: '🏋️ Lifting body',
      body_ache_pain: '🤕 Body ache & pain'
    };

    let currentLocation = 'huizhou';
    let historyLocation = 'huizhou';
    let allStudents = [];

    function isHuizhou(id) { return HUIZHOU_IDS.includes(id); }

    function showMainTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
      if (tab === 'students') loadStudents();
      else if (tab === 'history') loadHistory();
    }

    function showLocation(loc) {
      currentLocation = loc;
      document.querySelectorAll('#tab-students .sub-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderStudents();
    }

    function showHistoryLocation(loc) {
      historyLocation = loc;
      document.querySelectorAll('#tab-history .sub-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadHistory();
    }

    async function loadStudents() {
      const res = await fetch('/api/journal/students');
      const data = await res.json();
      allStudents = data.students || [];
      renderStudents();
    }

    function renderStudents() {
      let students = allStudents;
      if (currentLocation === 'huizhou') students = students.filter(s => isHuizhou(s.id));
      else if (currentLocation === 'bangkok') students = students.filter(s => !isHuizhou(s.id));

      if (students.length === 0) {
        document.getElementById('studentsList').innerHTML = '<div class="empty">No students in this category</div>';
        return;
      }

      const label = currentLocation === 'huizhou' ? '🍊' : currentLocation === 'bangkok' ? '🏙️' : '📋';
      let html = `<div class="count">${label} ${students.length} students</div>`;
      students.forEach(s => {
        const hz = isHuizhou(s.id);
        const badge = hz ? '<span class="badge badge-huizhou">Huizhou</span>' : '';
        const checkins = s.assessmentCount || 0;
        const lastDate = s.lastAssessment ? new Date(s.lastAssessment.checkedInAt).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'none yet';
        html += `
          <div class="student-item">
            <div class="info">
              <div class="name">${s.name}${badge}</div>
              <div class="meta">${checkins} check-ins · Last: ${lastDate}</div>
            </div>
            <button class="qr-btn" onclick="showQR('${s.id}','${s.name.replace(/'/g,"\\'")}')">📱 QR</button>
          </div>`;
      });
      document.getElementById('studentsList').innerHTML = html;
    }

    async function showQR(studentId, studentName) {
      document.getElementById('qrStudentName').textContent = studentName;
      document.getElementById('qrModal').classList.add('show');
      const res = await fetch(`/api/journal/qr/${studentId}`);
      const data = await res.json();
      document.getElementById('qrImage').src = data.qrDataUrl;
    }

    function closeQR() { document.getElementById('qrModal').classList.remove('show'); }
    document.getElementById('qrModal').addEventListener('click', function(e) { if (e.target === this) closeQR(); });

    async function loadHistory() {
      const days = document.getElementById('filterDays').value;
      const res = await fetch(`/api/journal/history/${days}`);
      const data = await res.json();
      let history = data.history || [];

      // Filter by location
      if (historyLocation === 'huizhou') history = history.filter(h => isHuizhou(h.studentId));
      else if (historyLocation === 'bangkok') history = history.filter(h => !isHuizhou(h.studentId));

      if (history.length === 0) {
        document.getElementById('historyList').innerHTML = '<div class="empty">No check-ins in this period</div>';
        return;
      }

      let html = `<div class="count">${history.length} check-ins</div>`;
      history.forEach(item => {
        const a = item.assessment || item;
        const name = item.studentName || a.studentName || 'Unknown';
        const sid = item.studentId || a.studentId || '';
        const hz = isHuizhou(sid);
        const badge = hz ? '<span class="badge badge-huizhou">Huizhou</span>' : '';
        const date = new Date(a.checkedInAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += `
          <div class="history-card">
            <div class="history-header">
              <div class="history-name">${name}${badge}</div>
              <div class="history-time">${date}</div>
            </div>
            <div class="history-grid">
              <div class="history-item">
                <div class="label">⚡ Vinyasa</div>
                <div class="value">${vinyasaEmoji[a.vinyasa] || '⚪'} ${vinyasaLabel[a.vinyasa] || a.vinyasa || '-'}</div>
              </div>
              <div class="history-item">
                <div class="label">🔮 Bandha</div>
                <div class="value">${bandhaEmoji[a.bandha] || '⚪'} ${bandhaLabel[a.bandha] || a.bandha || '-'}</div>
              </div>
              <div class="history-item">
                <div class="label">💪 Stable</div>
                <div class="value">${(a.stableToday || []).map(x => asanaEmoji[x] || x).join(', ') || '-'}</div>
              </div>
              <div class="history-item">
                <div class="label">🎯 Difficult</div>
                <div class="value">${(a.difficultToday || []).map(x => asanaEmoji[x] || x).join(', ') || '-'}</div>
              </div>
            </div>
            ${a.lastAsanaNote ? `<div class="history-text">🎯 Last Asana: ${a.lastAsanaNote}</div>` : ''}
            ${a.practiceNotes ? `<div class="history-text">📝 ${a.practiceNotes}</div>` : ''}
          </div>`;
      });
      document.getElementById('historyList').innerHTML = html;
    }

    // Init — default to Huizhou
    loadStudents();
  </script>
</body>
</html>
