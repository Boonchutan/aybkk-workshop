<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link LINE Account - AYBKK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    h1 { 
      color: #00b900; 
      margin-bottom: 8px; 
      font-size: 24px;
    }
    .subtitle { 
      color: #666; 
      margin-bottom: 24px;
      font-size: 14px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #00b900;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #00b900;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #00a000; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
    .info { background: #e3f2fd; color: #1565c0; }
    .steps {
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #555;
    }
    .steps li { margin-bottom: 8px; padding-left: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Link LINE Account</h1>
    <p class="subtitle">Connect your LINE to your AYBKK student profile</p>
    
    <div class="steps">
      <strong>How it works:</strong>
      <ol style="margin-top: 8px; padding-left: 20px;">
        <li>Add <strong>@aybkk help desk</strong> on LINE</li>
        <li>You'll receive a <strong>4-digit code</strong></li>
        <li>Enter the code below with your name</li>
      </ol>
    </div>

    <form id="claimForm">
      <label for="studentId">Your Name</label>
      <input type="text" id="studentId" placeholder="e.g., John Smith" required>

      <label for="code">Verification Code</label>
      <input type="text" id="code" placeholder="e.g., 1234" maxlength="6" required>

      <button type="submit" id="submitBtn">Link Account</button>
    </form>

    <div id="message" class="message" style="display: none;"></div>
  </div>

  <script>
    const form = document.getElementById('claimForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
      messageEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Linking...';

      const studentId = document.getElementById('studentId').value.trim();
      const code = document.getElementById('code').value.trim();

      try {
        const res = await fetch('/api/line/claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId, code })
        });

        const data = await res.json();

        if (data.success) {
          showMessage('✓ ' + (data.message || 'Account linked successfully!'), 'success');
          form.reset();
        } else {
          showMessage('✗ ' + (data.error || 'Something went wrong'), 'error');
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Link Account';
    });
  </script>
</body>
</html>
