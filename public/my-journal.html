<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Practice Journal — AYBKK</title>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* my-journal.html — student practice history view.
       Visual language imported from tokens.css (beech wood + walnut + carved
       clay). Page-specific layout and component styles only here. */

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "kern" 1, "liga" 1;
    }
    * { margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 0 auto; padding: var(--space-5) var(--space-4) var(--space-7); }

    /* Brand logo — printed onto the cream wall, not floating */
    .brand-logo {
      display: block; width: 60px; height: 60px;
      margin: 0 auto var(--space-3);
      mix-blend-mode: multiply;
      filter: contrast(1.05);
    }

    .header { text-align: center; margin-bottom: var(--space-3); }
    .header h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 5.4vw, 30px);
      font-weight: 800;
      letter-spacing: -0.012em;
      line-height: 1.15;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
    }
    .student-name {
      font-family: var(--font-body);
      font-size: 15px; font-style: italic;
      color: var(--accent);
      margin-top: 6px;
    }
    .stats {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    /* Motto — Boonchu's voice between two hairlines, like a printed manual */
    .motto {
      max-width: 360px; margin: 0 auto var(--space-5);
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-body);
      font-size: 14px; line-height: 1.55; font-style: italic;
      text-align: center;
      color: var(--accent);
      border-top: 1px solid var(--shadow-dark);
      border-bottom: 1px solid var(--shadow-dark);
    }
    .motto strong { font-style: normal; font-weight: 600; color: var(--primary-deep); }

    /* Language switch — restrained pill row */
    .lang-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: var(--space-4); }
    .lang-btn {
      padding: 7px 14px;
      background: var(--surface);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
      cursor: pointer;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .lang-btn:active { transform: scale(0.96); }
    .lang-btn.active {
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      color: #f1e2c4;
      text-shadow:
        1px 1px 0 rgba(255, 240, 215, 0.55),
        -1px -1px 1px rgba(50, 28, 10, 0.65);
      box-shadow:
        inset 3px 3px 6px rgba(255, 240, 215, 0.4),
        inset -2px -2px 4px rgba(40, 20, 4, 0.25),
        6px 6px 12px rgba(120, 80, 40, 0.25);
    }

    /* Nav tabs — three carved-wood plaques. Active = pressed in. */
    .nav-tabs { display: flex; gap: var(--space-2); margin-bottom: var(--space-5); }
    .nav-tab {
      flex: 1;
      padding: 14px 8px;
      background: var(--surface);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      line-height: 1;
      box-shadow:
        6px 6px 14px var(--shadow-dark),
        -4px -4px 10px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .nav-tab:active { transform: scale(0.97); }
    .nav-tab.active {
      background: var(--surface-2);
      color: var(--primary-deep);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.95),
        inset 5px 5px 12px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    /* Loading */
    .loading { text-align: center; padding: var(--space-7) var(--space-5); }
    .loading p {
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
    }
    .spinner {
      font-size: 36px;
      margin-bottom: var(--space-3);
      color: var(--accent);
      animation: spin 1.6s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Teacher's Note — carved walnut card */
    .teacher-card {
      background: var(--surface-2);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-5) var(--space-4);
      margin-bottom: var(--space-5);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.95),
        inset 4px 4px 5px rgba(150, 120, 80, 0.13),
        inset -4px -4px 5px rgba(253, 250, 242, 0.55),
        inset 22px 22px 44px var(--shadow-dark),
        inset -14px -14px 28px var(--shadow-light);
    }
    .teacher-card-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: var(--space-3);
    }
    .teacher-card-header strong {
      font-family: var(--font-display);
      font-weight: 700; font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--primary-deep);
    }
    .tc-date {
      font-family: var(--font-body);
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
    }
    .tc-comment {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 17px; line-height: 1.65;
      color: var(--ink);
      padding: var(--space-1) 0 var(--space-2);
    }
    .tc-comment::before {
      content: '“';
      color: var(--accent);
      font-size: 38px;
      line-height: 0;
      vertical-align: -14px;
      margin-right: 4px;
      font-family: var(--font-display);
      font-weight: 700;
    }
    .tc-focus-block {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px dashed var(--shadow-dark);
    }
    .tc-focus-label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: 6px;
    }
    .tc-focus {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink);
    }

    /* Entry — raised beech block, like a page from a printed practice book */
    .entry {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      box-shadow:
        16px 16px 32px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
    }
    .entry-date {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--shadow-dark);
    }
    .entry-row {
      display: flex; gap: var(--space-3);
      margin-bottom: var(--space-2);
      align-items: flex-start;
    }
    .entry-row .label {
      flex-shrink: 0; min-width: 78px;
      padding-top: 2px;
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
    }
    .entry-row .value {
      flex: 1;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--ink);
    }

    /* Tag chips — earth-toned, semantic */
    .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      box-shadow:
        inset 2px 2px 4px rgba(150, 120, 80, 0.18),
        inset -1px -1px 3px rgba(253, 250, 242, 0.65);
    }
    .tag.strength { background: #ddd9c2; color: #4f5d3a; }
    .tag.growth   { background: #ecd5be; color: #8d4f2c; }

    /* Practice notes — typographic block, no nested card */
    .entry-note {
      margin-top: var(--space-4);
      padding-top: var(--space-3);
      border-top: 1px dashed var(--shadow-dark);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.65;
      font-style: italic;
      color: var(--ink);
    }
    .entry-note .label-inline {
      display: block;
      font-family: var(--font-display);
      font-style: normal;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: 6px;
    }

    /* View Card — small carved pill */
    .view-card-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: var(--space-4);
      padding: 9px 18px;
      background: var(--surface);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--primary-deep);
      cursor: pointer;
      box-shadow:
        6px 6px 12px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .view-card-btn:hover { transform: translateY(-2px); }
    .view-card-btn:active { transform: scale(0.96); }

    /* Empty state */
    .empty { text-align: center; padding: var(--space-7) var(--space-5); }
    .empty-icon {
      font-size: 44px;
      margin-bottom: var(--space-3);
      color: var(--accent);
      opacity: 0.55;
    }
    .empty-msg {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-5);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center; justify-content: center;
      text-decoration: none;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f1e2c4;
      padding: 16px 32px;
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      text-shadow:
        1px 1px 0 rgba(255, 240, 215, 0.7),
        -1px -1px 1px rgba(50, 28, 10, 0.85),
        -2px -2px 4px rgba(50, 28, 10, 0.55);
      box-shadow:
        14px 14px 28px rgba(120, 80, 40, 0.30),
        -8px -8px 18px var(--shadow-light),
        inset 4px 4px 10px rgba(255, 240, 215, 0.5),
        inset -3px -3px 8px rgba(40, 20, 4, 0.25);
      cursor: pointer;
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .btn-primary:hover { transform: translateY(-3px) scale(1.02); }
    .btn-primary:active { transform: scale(0.97); }

    /* Card modal — dark photo viewer (untouched semantics) */
    .card-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(20, 14, 8, 0.92);
      z-index: 200;
      flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-5);
    }
    .card-modal-inner { text-align: center; max-width: 340px; width: 100%; }
    .card-modal-hint {
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: rgba(252, 249, 239, 0.85);
      margin-bottom: var(--space-3);
    }
    .card-modal img {
      width: 100%;
      border-radius: 22px;
      display: block;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
    }
    .card-modal button {
      margin-top: var(--space-4);
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(252, 249, 239, 0.25);
      background: transparent;
      color: rgba(252, 249, 239, 0.92);
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--dur-base);
    }
    .card-modal button:hover { background: rgba(252, 249, 239, 0.08); }

    /* Q&A public feed (Question Board v2) */
    .qa-empty {
      text-align: center;
      padding: var(--space-7) var(--space-5);
    }
    .qa-empty .icon {
      font-size: 44px;
      margin-bottom: var(--space-3);
      color: var(--accent);
      opacity: 0.55;
    }
    .qa-empty .msg {
      font-family: var(--font-body);
      font-size: 15px;
      font-style: italic;
      color: var(--ink-soft);
    }

    .qa-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      box-shadow:
        16px 16px 32px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
    }
    .qa-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }
    .qa-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4ba8c 0%, #997a52 100%);
      box-shadow:
        inset 3px 3px 6px rgba(255, 240, 215, 0.3),
        inset -2px -2px 4px rgba(40, 20, 4, 0.2);
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-size: 13px; font-weight: 800;
      color: #fff5e0;
    }
    .qa-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
    }
    .qa-country {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: var(--surface-2);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--primary-deep);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }
    .qa-when {
      margin-left: auto;
      font-family: var(--font-body);
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
    }
    .qa-text {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--ink);
      margin-bottom: var(--space-4);
      letter-spacing: -0.005em;
    }
    /* Answer block — carved cavity inside the qa card */
    .qa-answer {
      padding: 18px 20px;
      border-radius: var(--radius-md);
      background: var(--surface-2);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.92),
        inset 5px 5px 10px rgba(150, 120, 80, 0.13);
    }
    .qa-answer-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .qa-answer-badge {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: linear-gradient(135deg, #a47e54, var(--accent));
      color: #fdf6e6;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      box-shadow: 4px 4px 10px rgba(110, 85, 55, 0.30);
    }
    .qa-teacher {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
    }
    .qa-answer-text {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <img class="brand-logo" src="/aybkk-logo.jpg" alt="AYBKK">
    <h1 id="pageTitle">My Practice Journal</h1>
    <div class="student-name" id="studentNameEl"></div>
    <div class="stats" id="statsEl"></div>
  </div>

  <div class="motto" id="mottoLine"></div>

  <div class="lang-switch">
    <button class="lang-btn" data-lang="th">🇹🇭 TH</button>
    <button class="lang-btn" data-lang="zh">🇨🇳 ZH</button>
    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
  </div>

  <div class="nav-tabs">
    <a class="nav-tab" id="navNewEntry"></a>
    <a class="nav-tab active" id="navHistory" onclick="showHistoryView(); return false;" href="#"></a>
    <a class="nav-tab" id="navQA" onclick="showQAView(); return false;" href="#"></a>
    <a class="nav-tab" id="navWeek"></a>
  </div>

  <div id="loading" class="loading">
    <div class="spinner">☸</div>
    <p id="loadingText">Loading…</p>
  </div>

  <div id="teacherCommentBox" class="teacher-card" style="display:none;">
    <div class="teacher-card-header">
      <strong id="tcLabel">Teacher's Note</strong>
      <span class="tc-date" id="tcDate"></span>
    </div>
    <div class="tc-comment" id="tcComment"></div>
    <div class="tc-focus-block" id="tcFocusBlock" style="display:none;">
      <div class="tc-focus-label" id="tcFocusLabel">🎯 Next Focus</div>
      <div class="tc-focus" id="tcFocus"></div>
    </div>
  </div>

  <div id="entries" style="display:none;"></div>

  <div id="empty" class="empty" style="display:none;">
    <div class="empty-icon">📔</div>
    <div class="empty-msg" id="emptyMsg"></div>
    <a class="btn-primary" id="emptyCta"></a>
  </div>

  <!-- Q&A public feed (Question Board v2) -->
  <div id="qaSection" style="display:none;">
    <div id="qaList"></div>
  </div>
</div>

<div class="card-modal" id="cardModal">
  <div class="card-modal-inner">
    <div class="card-modal-hint" id="cardModalHint"></div>
    <img id="cardModalImg" alt="">
    <button onclick="closeCardModal()" id="cardModalClose"></button>
  </div>
</div>

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso.slice(0, 10);
  const opts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
  const locale = lang === 'zh' ? 'zh-CN' : lang === 'th' ? 'th-TH' : lang === 'ru' ? 'ru-RU' : 'en-US';
  try { return d.toLocaleDateString(locale, opts); } catch (e) { return d.toLocaleDateString('en-US', opts); }
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function getDayColor(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  if (isNaN(d.getTime())) return DAY_COLORS[2];
  const idx = d.getDay();
  return DAY_COLORS[idx === 0 ? 6 : idx - 1];
}

function getDailyQuote(dateStr) {
  const start = new Date('2026-05-01');
  const d = dateStr ? new Date(dateStr) : new Date();
  d.setHours(0, 0, 0, 0);
  const dayIndex = Math.floor((d - start) / 86400000);
  const safeIndex = ((dayIndex % WISDOM_QUOTES.length) + WISDOM_QUOTES.length) % WISDOM_QUOTES.length;
  return WISDOM_QUOTES[safeIndex];
}

function getDayInfoText(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  if (isNaN(d.getTime())) return '';
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  const locale = lang === 'zh' ? 'zh-CN' : lang === 'th' ? 'th-TH' : lang === 'ru' ? 'ru-RU' : 'en-US';
  try { return d.toLocaleDateString(locale, opts) + ' · Practice Journal ✅'; }
  catch (e) { return d.toLocaleDateString('en-US', opts) + ' · Practice Journal ✅'; }
}

function getUpliftPhrase(notes) {
  if (!notes || !notes.trim()) return null;
  // zh students see the original Chinese; everyone else (en/th/ru) sees English.
  const useEn = (typeof lang !== 'undefined' && lang !== 'zh');
  const pick = (entry) => useEn ? (entry.en || entry.phrase) : entry.phrase;
  const lower = notes.toLowerCase();
  for (const entry of UPLIFT_PHRASES) {
    if (entry.keywords.length === 0) continue;
    for (const kw of entry.keywords) {
      if (lower.includes(kw.toLowerCase())) return pick(entry);
    }
  }
  const def = UPLIFT_PHRASES.filter(e => e.keywords.length === 0);
  return def.length ? pick(def[0]) : null;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(' ');
  let line = '';
  const lines = [];
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line !== '') {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line = test;
    }
  }
  lines.push(line.trim());
  const startY = y - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
}

function loadImageSafe(url, timeoutMs = 6000) {
  // Adds a hard timeout so the share-card render never hangs forever when
  // a CDN host is blocked from the user's network (e.g. Cloudinary blocked
  // from Russia). Without this, my-journal "View Card" modal opened but
  // never rendered the image — sat empty with just the Close button.
  return new Promise(resolve => {
    if (!url) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    let done = false;
    const finish = (result) => { if (!done) { done = true; resolve(result); } };
    const timer = setTimeout(() => finish(null), timeoutMs);
    img.onload = () => { clearTimeout(timer); finish(img); };
    img.onerror = () => { clearTimeout(timer); finish(null); };
    img.src = url;
  });
}

async function renderShareCard(entry, name, photoUrl) {
  const date = entry.checkedInAt || entry.sessionDate;
  const dc = getDayColor(date);
  const quote = getDailyQuote(date);
  const uplift = getUpliftPhrase(entry.practiceNotes);
  const dayInfo = getDayInfoText(date);
  const shareTitle = getCardEyebrow();

  // Make sure Spectral has loaded before drawing — canvas fonts must be ready
  // or the browser silently falls back to system serif.
  try {
    await Promise.all([
      document.fonts.load("700 48px Spectral"),
      document.fonts.load("600 24px Spectral"),
      document.fonts.load("500 11px Spectral"),
      document.fonts.load("italic 400 17px Spectral"),
      document.fonts.load("italic 300 12px Spectral")
    ]);
  } catch (_) { /* fall back to serif system stack */ }

  const SERIF = "Spectral, 'Hoefler Text', 'Times New Roman', serif";
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 720;
  const ctx = canvas.getContext('2d');

  // 1. Day-color frame — fills around photo edges, sets the seasonal tone
  const frame = ctx.createLinearGradient(0, 0, 0, 720);
  frame.addColorStop(0, dc.hover);
  frame.addColorStop(1, dc.accent);
  ctx.fillStyle = frame;
  roundRect(ctx, 0, 0, 640, 720, 32);
  ctx.fill();

  // 2. Photo, almost full-strength so the face shows through
  let hasPhoto = false;
  if (photoUrl) {
    const img = await loadImageSafe(photoUrl);
    if (img) {
      hasPhoto = true;
      ctx.save();
      ctx.globalAlpha = 0.92;
      const scale = Math.max(640 / img.width, 720 / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      const sx = (640 - sw) / 2;
      const sy = (720 - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh);
      ctx.restore();

      // 3a. Top legibility band (eyebrow + name + date)
      const top = ctx.createLinearGradient(0, 0, 0, 290);
      top.addColorStop(0, dc.hover + 'D9');     // ~85% — strong at edge
      top.addColorStop(0.55, dc.accent + '80'); // ~50% mid
      top.addColorStop(1, dc.accent + '00');    // fade to clear above face
      ctx.fillStyle = top;
      ctx.fillRect(0, 0, 640, 290);

      // 3b. Bottom legibility band (quote + uplift + byline)
      const bot = ctx.createLinearGradient(0, 380, 0, 720);
      bot.addColorStop(0, dc.accent + '00');
      bot.addColorStop(0.35, dc.accent + '99');
      bot.addColorStop(1, dc.hover + 'E6');
      ctx.fillStyle = bot;
      ctx.fillRect(0, 380, 640, 340);
    }
  }
  // No photo? Add a soft single-tone wash so text contrasts predictably.
  if (!hasPhoto) {
    const wash = ctx.createLinearGradient(0, 0, 0, 720);
    wash.addColorStop(0, dc.hover);
    wash.addColorStop(0.5, dc.accent);
    wash.addColorStop(1, dc.hover);
    ctx.fillStyle = wash;
    roundRect(ctx, 0, 0, 640, 720, 32);
    ctx.fill();
  }

  // 4. Logo — a single small mark, top center
  const logo = await loadImageSafe('/aybkk-logo.jpg');
  if (logo) {
    const r = 26, cx = 320, cy = 56;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(logo, cx - r, cy - r, r * 2, r * 2);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.textAlign = 'center';

  // helper — draw text with subtle dark shadow for legibility on photos
  const draw = (text, font, color, x, y, shadow) => {
    ctx.font = font;
    ctx.fillStyle = color;
    if (shadow) {
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = shadow.blur || 6;
      ctx.shadowOffsetY = shadow.y || 2;
    }
    ctx.fillText(text, x, y);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
  };

  // 5. EYEBROW — uppercase, letter-spaced, reads as a journal masthead
  ctx.letterSpacing = '4px';
  draw(shareTitle, `500 11px ${SERIF}`, 'rgba(255,255,255,0.88)', 320, 116, { blur: 4, y: 1 });
  ctx.letterSpacing = '0px';

  // 6. NAME — the hero. Big serif, light shadow for face-photo readability.
  draw(name, `700 48px ${SERIF}`, '#ffffff', 320, 218, { blur: 8, y: 2 });

  // 7. DATE — small italic, breathes under the name
  draw(dayInfo, `italic 400 17px ${SERIF}`, 'rgba(255,255,255,0.85)', 320, 252, { blur: 3, y: 1 });

  // 8. Hairline divider — thin, restrained
  ctx.strokeStyle = 'rgba(255,255,255,0.32)';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(220, 290);
  ctx.lineTo(420, 290);
  ctx.stroke();

  // 9. QUOTE — the sutra/Gita line, italic body serif
  ctx.font = `italic 400 17px ${SERIF}`;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 1;
  wrapText(ctx, '“' + quote + '”', 320, 440, 500, 26);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // 10. UPLIFT — semibold serif (less aggressive than 700), stands as a refrain
  if (uplift) {
    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(220, 538);
    ctx.lineTo(420, 538);
    ctx.stroke();
    ctx.font = `600 22px ${SERIF}`;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;
    wrapText(ctx, uplift, 320, 580, 500, 32);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
  }

  // 11. BYLINE — smallest, lightest italic, gentle attribution
  draw('— Boonchu Tanti & Jamsai Tanti', `italic 300 12px ${SERIF}`, 'rgba(255,255,255,0.78)', 320, 686, { blur: 2, y: 1 });

  return canvas.toDataURL('image/png');
}

async function showEntryCard(idx) {
  const entry = allAssessments[idx];
  if (!entry) return;
  const modal = document.getElementById('cardModal');
  const img = document.getElementById('cardModalImg');
  const hint = document.getElementById('cardModalHint');
  modal.style.display = 'flex';
  img.src = '';
  hint.textContent = '…';
  try {
    // Per-entry photo first; fall back to the student's current photo for old
    // entries that pre-date the snapshot feature.
    const photoForEntry = entry.photoUrl || studentPhotoUrl;
    const dataUrl = await renderShareCard(entry, currentStudentName, photoForEntry);
    img.src = dataUrl;
    hint.textContent = t('longPressToSave');
  } catch (e) {
    console.error('card render failed', e);
    closeCardModal();
  }
}

function closeCardModal() {
  document.getElementById('cardModal').style.display = 'none';
  document.getElementById('cardModalImg').src = '';
}

let allAssessments = [];
let studentPhotoUrl = null;
let currentStudentName = studentName;
let studentClassType = '';

function getCardEyebrow() {
  // id prefix wins over classType because `chinese-workshop` is overloaded
  // for both Huizhou and Guangzhou cohorts in Neo4j.
  const id = studentId || '';
  const ct = studentClassType || '';
  if (id.startsWith('gz-')) return 'AYBKK · 广州工作坊 2026';
  if (id.startsWith('ru-')) return 'AYBKK · RUSSIA WS 2026';
  if (ct === 'in-depth-mysore-cn2') return 'AYBKK · IN-DEPTH MYSORE';
  if (ct === 'chinese-workshop') return 'AYBKK · HUIZHOU WORKSHOP';
  if (ct === 'russia-workshop') return 'AYBKK · RUSSIA WS 2026';
  return 'AYBKK · PRACTICE JOURNAL';
}

async function load() {
  if (P.get('demo') === '1') {
    return loadDemoData();
  }
  if (!studentId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('studentNameEl').textContent = studentName;
    return;
  }
  try {
    const res = await fetch('/api/journal/student/' + encodeURIComponent(studentId));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    allAssessments = data.assessments || [];
    studentPhotoUrl = data.photoUrl || null;
    currentStudentName = data.name || studentName;
    studentClassType = data.classType || '';
    document.getElementById('studentNameEl').textContent = currentStudentName;
    document.getElementById('statsEl').textContent = t('statsTpl').replace('{count}', allAssessments.length);
    render();
    // Optional teacher note — failures are silent, the section just stays hidden
    try {
      const cRes = await fetch('/api/journal/comments/' + encodeURIComponent(studentId));
      if (cRes.ok) {
        const cData = await cRes.json();
        const latest = cData.latest;
        if (latest && (latest.comment || latest.focus)) {
          const box = document.getElementById('teacherCommentBox');
          document.getElementById('tcComment').textContent = latest.comment || '';
          if (latest.focus) {
            document.getElementById('tcFocus').textContent = latest.focus;
            document.getElementById('tcFocusBlock').style.display = 'block';
          }
          if (latest.createdAt) {
            const d = new Date(latest.createdAt);
            if (!isNaN(d.getTime())) {
              const locale = lang === 'zh' ? 'zh-CN' : lang === 'th' ? 'th-TH' : lang === 'ru' ? 'ru-RU' : 'en-US';
              try { document.getElementById('tcDate').textContent = d.toLocaleDateString(locale, { month: 'short', day: 'numeric', year: 'numeric' }); }
              catch (e) {}
            }
          }
          box.style.display = 'block';
        }
      }
    } catch (_) {}
  } catch (err) {
    console.error('load failed:', err);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

function render() {
  document.getElementById('loading').style.display = 'none';
  if (!allAssessments.length) {
    document.getElementById('entries').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  const container = document.getElementById('entries');
  container.style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  container.innerHTML = allAssessments.map((a, i) => renderEntry(a, i)).join('');
}

function renderEntry(a, idx) {
  const stable = (a.stableToday || []).map(v => '<span class="tag strength">' + escapeHtml(tagLabel(v)) + '</span>').join('');
  const difficult = (a.difficultToday || []).map(v => '<span class="tag growth">' + escapeHtml(tagLabel(v)) + '</span>').join('');

  let html = '<div class="entry">';
  html += '<div class="entry-date">' + escapeHtml(fmtDate(a.checkedInAt || a.sessionDate)) + '</div>';

  if (a.vinyasa) {
    html += '<div class="entry-row"><span class="label">' + escapeHtml(t('vinyasaLabel')) + '</span><span class="value">' + escapeHtml(vinyasaLabel(a.vinyasa)) + '</span></div>';
  }
  if (a.bandha) {
    html += '<div class="entry-row"><span class="label">' + escapeHtml(t('bandhaLabel')) + '</span><span class="value">' + escapeHtml(bandhaLabel(a.bandha)) + '</span></div>';
  }
  if (stable) {
    html += '<div class="entry-row"><span class="label">' + escapeHtml(t('stableLabel')) + '</span><div class="value"><div class="tag-group">' + stable + '</div></div></div>';
  }
  if (difficult) {
    html += '<div class="entry-row"><span class="label">' + escapeHtml(t('difficultLabel')) + '</span><div class="value"><div class="tag-group">' + difficult + '</div></div></div>';
  }
  if (a.lastAsana) {
    html += '<div class="entry-note"><span class="label-inline">' + escapeHtml(t('asanaLabel')) + ':</span>' + escapeHtml(a.lastAsana) + '</div>';
  }
  if (a.practiceNotes) {
    html += '<div class="entry-note"><span class="label-inline">' + escapeHtml(t('notesLabel')) + ':</span>' + escapeHtml(a.practiceNotes) + '</div>';
  }
  html += '<button type="button" class="view-card-btn" onclick="showEntryCard(' + idx + ')">' + escapeHtml(t('viewCard')) + '</button>';
  html += '</div>';
  return html;
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

// ============================================
// Q&A public feed (Question Board v2) — toggled inline via nav tabs.
// History view = entries list + teacher card. Q&A view = published feed.
// One state at a time; data fetches lazily on first switch.
// ============================================
let qaLoaded = false;

function showHistoryView() {
  document.getElementById('qaSection').style.display = 'none';
  if (allAssessments.length) {
    document.getElementById('entries').style.display = 'block';
  } else {
    document.getElementById('empty').style.display = 'block';
  }
  const tcBox = document.getElementById('teacherCommentBox');
  if (tcBox && tcBox.dataset.hadContent === '1') tcBox.style.display = 'block';
  document.getElementById('navHistory').classList.add('active');
  document.getElementById('navQA').classList.remove('active');
}

function showQAView() {
  document.getElementById('entries').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  const tcBox = document.getElementById('teacherCommentBox');
  if (tcBox) {
    if (tcBox.style.display !== 'none') tcBox.dataset.hadContent = '1';
    tcBox.style.display = 'none';
  }
  document.getElementById('qaSection').style.display = 'block';
  document.getElementById('navHistory').classList.remove('active');
  document.getElementById('navQA').classList.add('active');
  if (!qaLoaded) loadQA();
}

async function loadQA() {
  const list = document.getElementById('qaList');
  list.innerHTML = '<div class="loading"><div class="spinner">☸</div><p>' + escapeHtml(t('loading')) + '</p></div>';
  try {
    const res = await fetch('/api/journal/questions?limit=50');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    qaLoaded = true;
    renderQA(data.questions || []);
  } catch (err) {
    list.innerHTML = '<div class="qa-empty"><div class="msg">Could not load. ' + escapeHtml(err.message) + '</div></div>';
  }
}

function renderQA(questions) {
  const list = document.getElementById('qaList');
  if (!questions.length) {
    list.innerHTML = '<div class="qa-empty"><div class="icon">☸</div><div class="msg">' + escapeHtml(t('qaEmpty')) + '</div></div>';
    return;
  }
  list.innerHTML = questions.map(q => `
    <div class="qa-card">
      <div class="qa-meta">
        <div class="qa-avatar">${escapeHtml(qaInitials(q.studentName))}</div>
        <span class="qa-name">${escapeHtml(q.studentName || '')}</span>
        ${q.studentCountry ? `<span class="qa-country">${escapeHtml(q.studentCountry)}</span>` : ''}
        <span class="qa-when">${escapeHtml(fmtDate(q.publishedAt || q.askedAt))}</span>
      </div>
      <div class="qa-text">${escapeHtml(q.text)}</div>
      <div class="qa-answer">
        <div class="qa-answer-header">
          <span class="qa-answer-badge">${escapeHtml(q.teacherName || 'Boonchu')}</span>
          <span class="qa-teacher">${escapeHtml(t('teacherReply'))}</span>
        </div>
        <div class="qa-answer-text">${escapeHtml(q.answer || '')}</div>
      </div>
    </div>
  `).join('');
}

function qaInitials(name) {
  if (!name) return '?';
  const parts = String(name).trim().split(/\s+/);
  return ((parts[0]?.[0] || '?') + (parts[1]?.[0] || '')).toUpperCase();
}

applyLang();
load();
