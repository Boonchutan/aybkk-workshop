<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jamsai & Boonchu — Work / Life Year Planner</title>

  <!-- Add to Home Screen: launches full-screen, no Safari chrome -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#eceff4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Planner">
  <link rel="apple-touch-icon" href="/planner-icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
              system-ui, "Manrope", "Helvetica Neue", Arial, sans-serif;
      --ink:        #14161a;   /* ~16:1 on the light field */
      --ink-soft:   #565b66;
      --accent:     #c0822a;   /* today */
      --glass:      rgba(255,255,255,0.62);
      --glass-2:    rgba(255,255,255,0.42);
      --glass-3:    rgba(255,255,255,0.30);
      --blur:       saturate(180%) blur(22px);
      --shadow:     0 12px 36px rgba(22,28,48,0.13);
      --shadow-sm:  0 6px 18px rgba(22,28,48,0.10);
      --hair:       rgba(22,28,48,0.07);
      --hair-2:     rgba(22,28,48,0.13);
      --r:          22px;
      --r-sm:       14px;
      --pill:       999px;
      --ease:       cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 78% -10%, #f4f1ff 0%, rgba(244,241,255,0) 60%),
        radial-gradient(1100px 800px at -5% 110%, #e7f3f6 0%, rgba(231,243,246,0) 55%),
        linear-gradient(180deg, #eef0f5 0%, #e6e9f1 100%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: rgba(192,130,42,0.28); }

    /* ---------- Top bar ---------- */
    .topbar {
      position: relative; z-index: 50; flex: none;
      display: flex; flex-direction: column;
      background: var(--glass);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: 0 1px 0 var(--hair), var(--shadow-sm);
    }
    .topbar-body {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 16px 22px;
      padding-top: calc(16px + env(safe-area-inset-top));
      max-height: 340px; overflow: hidden;
      transition: max-height .42s var(--ease), opacity .34s var(--ease),
                  padding .42s var(--ease);
    }
    .topbar.min .topbar-body {
      max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0;
      pointer-events: none;
    }
    .peek {
      flex: none; height: 22px; display: flex; align-items: center;
      justify-content: center; gap: 10px; cursor: pointer; color: var(--ink-soft);
      transition: background .2s;
    }
    .peek:hover { background: rgba(255,255,255,0.4); }
    .peek .grab {
      width: 46px; height: 5px; border-radius: 999px;
      background: rgba(22,28,48,0.22); transition: background .2s, width .2s;
    }
    .peek:hover .grab { background: var(--accent); width: 60px; }
    .peek .lbl {
      font-size: 11px; font-weight: 800; letter-spacing: 0.18em;
      text-transform: uppercase; opacity: 0;
      transition: opacity .3s; max-width: 0; overflow: hidden;
    }
    .topbar.min .peek .lbl { opacity: 0.62; max-width: 320px; }
    .brand { display: flex; flex-direction: column; line-height: 1.05; margin-right: auto; }
    .brand .eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px;
    }
    .brand h1 {
      margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
      color: var(--ink);
    }

    .glass-group {
      display: inline-flex; align-items: center; gap: 4px; padding: 5px;
      background: var(--glass-2);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      border-radius: var(--pill); box-shadow: var(--shadow-sm);
    }
    .yearnav .year {
      font-size: 19px; font-weight: 800; letter-spacing: -0.01em;
      min-width: 64px; text-align: center; color: var(--ink);
    }
    .iconbtn {
      width: 38px; height: 38px; border: none; cursor: pointer;
      border-radius: 50%; background: transparent; color: var(--ink);
      font-size: 19px; font-weight: 700; line-height: 1;
      transition: background var(--ease) .25s, transform var(--ease) .25s;
    }
    .iconbtn:hover { background: rgba(255,255,255,0.7); }
    .iconbtn:active { transform: scale(0.92); }

    .seg { display: inline-flex; padding: 5px; gap: 4px;
      background: var(--glass-2);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      border-radius: var(--pill); box-shadow: var(--shadow-sm); }
    .seg button {
      border: none; cursor: pointer; padding: 9px 18px;
      font-family: var(--font); font-weight: 700; font-size: 13px;
      color: var(--ink-soft); background: transparent;
      border-radius: var(--pill); transition: all var(--ease) .3s;
    }
    .seg button.active {
      color: var(--ink); background: #fff;
      box-shadow: 0 4px 14px rgba(22,28,48,0.16);
    }

    .zoom { gap: 2px; padding-left: 12px; padding-right: 12px; }
    .zoom label { font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--ink-soft); margin-right: 6px; }
    .zoom input[type=range] {
      -webkit-appearance: none; appearance: none; width: 116px; height: 6px;
      border-radius: 999px; background: rgba(22,28,48,0.16); cursor: pointer;
    }
    .zoom input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--ink); box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .btn {
      border: none; cursor: pointer; padding: 11px 20px;
      font-family: var(--font); font-weight: 700; font-size: 13px;
      letter-spacing: 0.01em; border-radius: var(--pill);
      transition: transform var(--ease) .25s, background var(--ease) .25s, filter var(--ease) .25s;
    }
    .btn:active { transform: scale(0.96); }
    .btn.primary { color: #fff; background: #2E4A6B; box-shadow: 0 8px 20px rgba(46,74,107,0.32); }
    .btn.primary:hover { filter: brightness(1.08); }
    .btn.ghost {
      color: var(--ink); background: var(--glass);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: var(--shadow-sm);
    }
    .btn.ghost:hover { background: rgba(255,255,255,0.8); }

    .saver {
      font-size: 11px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--ink-soft);
      opacity: 0; transition: opacity .3s; }
    .saver.show { opacity: 0.75; }

    /* ---------- Timeline ---------- */
    .stage { padding: 18px; flex: 1; min-height: 0; }
    #timelineWrap { position: relative; height: 100%; }
    .scroll {
      height: 100%; overflow: auto;
      border-radius: var(--r);
      background: var(--glass);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
    }
    #yearWrap { height: 100%; overflow: auto; }
    .grid { position: relative; }

    /* month header sticks to the top while you scroll down */
    .months {
      position: sticky; top: 0; z-index: 25; height: 54px;
      background: var(--glass-2);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: 0 1px 0 var(--hair-2);
    }
    .month-cell {
      position: absolute; top: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13.5px; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink);
    }

    .laneband { position: relative; z-index: 2; box-shadow: 0 1px 0 var(--hair); }
    .laneband:last-of-type { box-shadow: none; }

    .bd-layer { position: absolute; top: 54px; z-index: 0; pointer-events: none; }
    .bd-band {
      position: absolute; top: 0; bottom: 0; pointer-events: auto; cursor: pointer;
      display: flex; align-items: flex-start; justify-content: center;
      background: rgba(255,255,255,0.34);
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    }
    .bd-band span {
      margin-top: 9px; font-size: 11px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(20,22,26,0.34);
    }
    .bd-band:hover { background: rgba(255,255,255,0.5); }

    .gl-layer { position: absolute; top: 54px; z-index: 1; pointer-events: none; }
    .gl { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--hair); }
    .gl.q { background: var(--hair-2); }

    .lane-labels { position: absolute; left: 0; top: 54px; z-index: 20; }
    .lane-label {
      display: flex; align-items: center; gap: 11px; padding: 0 16px;
      background: var(--glass);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: 0 1px 0 var(--hair), 14px 0 22px rgba(22,28,48,0.07);
    }
    .lane-label .dot {
      width: 16px; height: 16px; border-radius: 6px; flex: none;
    }
    .lane-label .nm {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: 15.5px; font-weight: 700; color: var(--ink);
    }
    .lane-label .x {
      opacity: 0; cursor: pointer; border: none; background: none;
      color: var(--ink-soft); font-size: 15px; padding: 4px; line-height: 1;
      transition: opacity .2s; }
    .lane-label:hover .x { opacity: 0.55; }
    .lane-label .x:hover { opacity: 1; }

    /* collapsed side column: slim colour strip, name kept legible */
    .lane-labels.collapsed .lane-label {
      padding: 0; cursor: pointer; gap: 0;
      justify-content: center; overflow: hidden;
    }
    .lane-labels.collapsed .lane-label .dot,
    .lane-labels.collapsed .lane-label .x { display: none; }
    .lane-strip {
      writing-mode: vertical-rl; transform: rotate(180deg);
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* drag-to-resize handle for the tab column */
    #laneResizer {
      position: absolute; top: 54px; bottom: 0; width: 16px;
      transform: translateX(-50%); z-index: 30;
      cursor: col-resize; touch-action: none;
      display: flex; align-items: center; justify-content: center;
    }
    #laneResizer::before {
      content: ""; width: 4px; height: 46px; border-radius: 999px;
      background: rgba(22,28,48,0.18); transition: background .2s, height .2s;
    }
    #laneResizer:hover::before, #laneResizer.drag::before {
      background: var(--accent); height: 70px;
    }

    /* flat capsule — no stroke, no shadow, no gradient */
    .bar {
      position: absolute; border-radius: 999px;
      display: flex; align-items: center; padding: 0 16px; cursor: pointer;
      font-size: 14.5px; font-weight: 700; white-space: nowrap; overflow: hidden;
      transition: transform var(--ease) .22s, filter var(--ease) .22s;
    }
    .bar:hover { transform: translateY(-1px); filter: brightness(1.05); z-index: 6; }
    .bar .lbl { overflow: hidden; text-overflow: ellipsis; }
    .bar.pr-high { font-weight: 800; }
    .bar.pr-low { opacity: 0.5; font-weight: 600; }
    .bar.dot { padding: 0; border-radius: 50%; justify-content: center; }
    .bar-ext {
      position: absolute; z-index: 3; height: 20px; line-height: 20px;
      cursor: pointer; white-space: nowrap;
      font-size: 14px; font-weight: 700; color: var(--ink);
    }
    .bar-ext.pr-high { font-weight: 800; }
    .bar-ext.pr-low { opacity: 0.55; font-weight: 600; }

    .today { position: absolute; width: 2px; z-index: 5;
      background: var(--accent); pointer-events: none; }
    .today-pill {
      position: absolute; z-index: 6; transform: translateX(-50%);
      font-size: 12px; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: #fff; background: var(--accent);
      padding: 8px 18px; border-radius: var(--pill); white-space: nowrap;
      box-shadow: 0 8px 20px rgba(192,130,42,0.4);
    }
    .empty { text-align: center; padding: 70px 20px; color: var(--ink-soft);
      font-size: 16px; font-weight: 600; }

    /* ---------- Year grid ---------- */
    .yeargrid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .mini {
      padding: 18px; border-radius: var(--r);
      background: var(--glass);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: var(--shadow-sm);
    }
    .mini h3 {
      margin: 0 0 14px; font-size: 15px; font-weight: 800;
      letter-spacing: 0.04em; color: var(--ink);
    }
    .mini table { width: 100%; border-collapse: collapse; }
    .mini th {
      font-size: 11px; font-weight: 700; color: var(--ink-soft);
      padding-bottom: 8px;
    }
    .mini td {
      text-align: center; padding: 2px; height: 34px; width: 14.28%;
      font-size: 14px; position: relative;
    }
    .mini td .d {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; margin: 0 auto; border-radius: 9px;
      cursor: pointer; color: var(--ink); font-weight: 600;
      transition: transform .15s var(--ease);
    }
    .mini td.has .d { font-weight: 800; }
    .mini td.has .d:hover { transform: scale(1.12); }
    .mini td.today .d { background: var(--accent); color: #fff; font-weight: 800; }
    .mini td.dim .d { color: rgba(86,91,102,0.32); cursor: default; }
    .mini td .dots {
      position: absolute; bottom: 1px; left: 0; right: 0;
      display: flex; gap: 3px; justify-content: center;
    }
    .mini td .dots i { width: 5px; height: 5px; border-radius: 50%; display: block; }

    /* ---------- Modal ---------- */
    .scrim {
      position: fixed; inset: 0; z-index: 90; display: none;
      align-items: center; justify-content: center; padding: 20px;
      background: rgba(22,26,40,0.34);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    }
    .scrim.open { display: flex; }
    .modal {
      width: 100%; max-width: 470px; max-height: 90vh; overflow-y: auto;
      padding: 28px; border-radius: 26px;
      background: rgba(255,255,255,0.86);
      -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      box-shadow: 0 30px 70px rgba(20,24,40,0.4);
    }
    .modal h2 { margin: 0 0 4px; font-size: 22px; font-weight: 800;
      letter-spacing: -0.01em; color: var(--ink); }
    .modal .sub { margin: 0 0 22px; font-size: 13.5px; color: var(--ink-soft); }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; margin-bottom: 7px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft);
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 13px 15px; border: none; color: var(--ink);
      font-family: var(--font); font-size: 15px; border-radius: var(--r-sm);
      background: rgba(22,28,48,0.05);
      transition: background .2s, box-shadow .2s;
    }
    .field textarea { resize: vertical; min-height: 66px; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; background: #fff;
      box-shadow: 0 0 0 3px rgba(46,74,107,0.35);
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .swatches { display: flex; flex-wrap: wrap; gap: 9px; }
    .swatches button {
      width: 30px; height: 30px; border-radius: 9px; border: none; cursor: pointer;
      transition: transform .15s var(--ease);
    }
    .swatches button:hover { transform: scale(1.12); }
    .swatches button.sel { box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--ink); }
    .modal-actions { display: flex; gap: 12px; margin-top: 26px; }
    .modal-actions .btn { flex: 1; }
    .danger { border: none; cursor: pointer; padding: 12px 18px; color: #c0392b;
      font-family: var(--font); font-weight: 700; font-size: 13px;
      border-radius: var(--pill); background: rgba(192,57,43,0.10); }
    .danger:hover { background: rgba(192,57,43,0.18); }
    .daylist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .dayrow {
      display: flex; align-items: center; gap: 11px; cursor: pointer;
      padding: 12px 14px; border-radius: var(--r-sm); background: rgba(22,28,48,0.05);
      transition: background .18s; }
    .dayrow:hover { background: rgba(22,28,48,0.09); }
    .dayrow .dot { width: 11px; height: 11px; border-radius: 4px; flex: none; }
    .dayrow .meta { font-size: 11px; color: var(--ink-soft); margin-left: auto; }

    @media (max-width: 680px) {
      .topbar-body { padding: 14px 14px;
        padding-top: calc(14px + env(safe-area-inset-top)); gap: 10px; }
      .brand { width: 100%; margin-right: 0; }
      .stage { padding: 12px; }
      .zoom { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar" id="topbar">
 <div class="topbar-body">
  <div class="brand">
    <span class="eyebrow">Jamsai &amp; Boonchu</span>
    <h1>Work / Life Year Planner</h1>
  </div>
  <div class="glass-group yearnav">
    <button class="iconbtn" id="prevY" title="Previous year">‹</button>
    <span class="year" id="yearLbl">2026</span>
    <button class="iconbtn" id="nextY" title="Next year">›</button>
  </div>
  <button class="btn ghost" id="todayBtn">Today</button>
  <div class="seg">
    <button id="vTimeline" class="active">Timeline</button>
    <button id="vYear">Year Grid</button>
  </div>
  <div class="glass-group zoom" id="zoomGroup">
    <label>Zoom</label>
    <button class="iconbtn" id="zoomOut" title="Compress">−</button>
    <input type="range" id="zoomRange" min="4" max="26" step="1">
    <button class="iconbtn" id="zoomIn" title="Expand">+</button>
  </div>
  <button class="btn ghost" id="addLane">+ Lane</button>
  <button class="btn primary" id="addEvent">+ Event</button>
  <span class="saver" id="saver">Saved</span>
 </div>
 <div class="peek" id="peek" title="Show / hide the bar">
   <span class="grab"></span>
   <span class="lbl">Jamsai &amp; Boonchu · Year Planner</span>
 </div>
</div>

<div class="stage">
  <div id="timelineWrap">
    <div class="scroll" id="scroll">
      <div class="grid" id="grid"></div>
    </div>
    <div id="laneResizer" title="Drag to resize · double-click to reset"></div>
  </div>
  <div id="yearWrap" style="display:none;">
    <div class="yeargrid" id="yeargrid"></div>
  </div>
</div>

<!-- Event modal -->
<div class="scrim" id="evScrim">
  <div class="modal">
    <h2 id="evTitle">New Event</h2>
    <p class="sub">Spans show as bars on the timeline.</p>
    <div class="field">
      <label>Title</label>
      <input id="fTitle" type="text" placeholder="e.g. Guangzhou workshop">
    </div>
    <div class="row2">
      <div class="field">
        <label>Lane</label>
        <select id="fLane"></select>
      </div>
      <div class="field">
        <label>Importance</label>
        <select id="fPriority">
          <option value="normal">Normal</option>
          <option value="high">High, stands out</option>
          <option value="low">Low, fades back</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Start</label><input id="fStart" type="date"></div>
      <div class="field"><label>End</label><input id="fEnd" type="date"></div>
    </div>
    <div class="field">
      <label>Colour (optional, defaults to lane)</label>
      <div class="swatches" id="evSwatch"></div>
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <textarea id="fNote" placeholder="Details, links, who is involved"></textarea>
    </div>
    <div class="modal-actions">
      <button class="danger" id="evDelete" style="display:none;">Delete</button>
      <button class="btn ghost" id="evCancel">Cancel</button>
      <button class="btn primary" id="evSave">Save</button>
    </div>
  </div>
</div>

<!-- Lane modal -->
<div class="scrim" id="lnScrim">
  <div class="modal">
    <h2>New Lane</h2>
    <p class="sub">A new row on the timeline, for example a new project.</p>
    <div class="field">
      <label>Lane name</label>
      <input id="fLaneName" type="text" placeholder="e.g. Certification Course">
    </div>
    <div class="field">
      <label>Colour</label>
      <div class="swatches" id="lnSwatch"></div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="lnCancel">Cancel</button>
      <button class="btn primary" id="lnSave">Add lane</button>
    </div>
  </div>
</div>

<!-- Day modal -->
<div class="scrim" id="dyScrim">
  <div class="modal">
    <h2 id="dyTitle">Day</h2>
    <p class="sub" id="dySub"></p>
    <div class="daylist" id="dyList"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="dyClose">Close</button>
      <button class="btn primary" id="dyAdd">+ Add on this day</button>
    </div>
  </div>
</div>

<script>
const PALETTE = ['#E8503A','#F0962E','#EBB22E','#5FA463','#3FB3CC','#2E4A6B',
                 '#2FA38C','#8A4F86','#5B6B7B','#E0726A'];
let DAY_W = clampNum(+localStorage.getItem('plnr.dayW') || 9, 4, 26);
let LABEL_W = clampNum(+localStorage.getItem('plnr.labelW') || 210, 132, 480);
const COLLAPSED_W = 34;
let lanesCollapsed = localStorage.getItem('plnr.lanesCol') === '1';
const LW = () => lanesCollapsed ? COLLAPSED_W : LABEL_W;   // effective gutter
const ROW_H = 46, LANE_PAD = 14;
const BAR_H = { low: 16, normal: 28, high: 36 };
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW = ['S','M','T','W','T','F','S'];

let state = { lanes: [], events: [] };
let year = new Date().getFullYear();
let view = 'timeline';
let editingId = null, pendingDay = null, saveTimer = null, autoScroll = true;

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2, '0');
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parse = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const isLeap = y => (y%4===0 && y%100!==0) || y%400===0;
const daysInYear = y => isLeap(y) ? 366 : 365;
const dayOfYear = d => Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
function clampNum(v,a,b){ return Math.max(a, Math.min(b, v)); }

// Pick black or white text for max contrast on a given bar colour
function lum(hex) {
  const n = parseInt(hex.slice(1), 16);
  const c = [n>>16&255, n>>8&255, n&255].map(v => {
    v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  });
  return 0.2126*c[0] + 0.7152*c[1] + 0.0722*c[2];
}
function textOn(hex) {
  const L = lum(hex);
  const cW = 1.05 / (L + 0.05);          // contrast vs white
  const cB = (L + 0.05) / 0.05;          // contrast vs near-black
  return cB >= cW ? '#15171a' : '#ffffff';
}
function tint(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;
}

async function load() {
  try {
    const r = await fetch('/api/calendar');
    const data = await r.json();
    state.lanes = data.lanes || [];
    state.events = data.events || [];
  } catch (e) { console.error(e); }
  render();
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await fetch('/api/calendar', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      const s = $('saver'); s.classList.add('show');
      setTimeout(() => s.classList.remove('show'), 1600);
    } catch (e) { console.error(e); }
  }, 500);
}

const laneById = id => state.lanes.find(l => l.id === id);
const colorOf = ev => ev.color || (laneById(ev.laneId)||{}).color || '#5B6B7B';

function eventsForYear() {
  const y0 = new Date(year,0,1), y1 = new Date(year,11,31);
  return state.events.map(ev => {
    const s = parse(ev.start), e = parse(ev.end || ev.start);
    if (e < y0 || s > y1) return null;
    const cs = s < y0 ? y0 : s, ce = e > y1 ? y1 : e;
    return { ev, startDay: dayOfYear(cs)-1, endDay: dayOfYear(ce)-1,
             clipL: s < y0, clipR: e > y1 };
  }).filter(Boolean);
}

// Greedy stack; reserve room for the label so short bars with long
// names don't collide with the next event in the row.
function packLane(items) {
  const rows = [];
  items.sort((a,b) => a.startDay - b.startDay);
  items.forEach(it => {
    const single = it.startDay === it.endDay;
    const labelDays = single ? 1 : Math.ceil((it.ev.title.length * 8.4 + 28) / DAY_W);
    it.packEnd = Math.max(it.endDay, it.startDay + Math.max(single ? 1 : 2, labelDays));
    let r = rows.findIndex(end => end < it.startDay);
    if (r === -1) { r = rows.length; rows.push(it.packEnd); }
    else rows[r] = it.packEnd;
    it.row = r;
  });
  return Math.max(rows.length, 1);
}

function renderTimeline() {
  const grid = $('grid');
  const total = daysInYear(year);
  const lw = LW();
  grid.style.width = (lw + total * DAY_W) + 'px';
  grid.innerHTML = '';
  grid.style.paddingBottom = '';

  const months = document.createElement('div');
  months.className = 'months';
  for (let m = 0; m < 12; m++) {
    const startD = dayOfYear(new Date(year, m, 1)) - 1;
    const span = new Date(year, m+1, 0).getDate();
    const cell = document.createElement('div');
    cell.className = 'month-cell';
    cell.style.left = (lw + startD * DAY_W) + 'px';
    cell.style.width = span * DAY_W + 'px';
    cell.textContent = MON_ABBR[m];
    months.appendChild(cell);
  }
  grid.appendChild(months);

  const yev = eventsForYear();
  const backdrops = yev.filter(it => it.ev.backdrop);
  const grouped = {};
  yev.filter(it => !it.ev.backdrop)
     .forEach(it => (grouped[it.ev.laneId] = grouped[it.ev.laneId] || []).push(it));

  const layout = state.lanes.map(lane => {
    const items = grouped[lane.id] || [];
    const sub = packLane(items);
    return { lane, items, sub, h: sub * ROW_H + LANE_PAD * 2 };
  });
  const bodyH = layout.reduce((s, l) => s + l.h, 0);

  const bd = document.createElement('div');
  bd.className = 'bd-layer';
  bd.style.left = lw + 'px'; bd.style.height = bodyH + 'px';
  backdrops.forEach(it => {
    const el = document.createElement('div');
    el.className = 'bd-band';
    el.style.left = it.startDay * DAY_W + 'px';
    el.style.width = (it.endDay - it.startDay + 1) * DAY_W + 'px';
    el.innerHTML = `<span>${esc(it.ev.title)}</span>`;
    el.title = `${it.ev.title}\n${fmt(it.ev.start)} – ${fmt(it.ev.end)}`
      + (it.ev.note ? `\n\n${it.ev.note}` : '');
    el.onclick = () => openEvent(it.ev.id);
    bd.appendChild(el);
  });
  grid.appendChild(bd);

  const gl = document.createElement('div');
  gl.className = 'gl-layer';
  gl.style.left = lw + 'px'; gl.style.height = bodyH + 'px';
  for (let m = 1; m < 12; m++) {
    const d = dayOfYear(new Date(year, m, 1)) - 1;
    const ln = document.createElement('div');
    ln.className = 'gl' + (m % 3 === 0 ? ' q' : '');
    ln.style.left = d * DAY_W + 'px';
    gl.appendChild(ln);
  }
  grid.appendChild(gl);

  const labels = document.createElement('div');
  labels.className = 'lane-labels' + (lanesCollapsed ? ' collapsed' : '');
  labels.style.width = lw + 'px';

  layout.forEach(({ lane, items, h }) => {
    const band = document.createElement('div');
    band.className = 'laneband';
    band.style.height = h + 'px';
    band.style.marginLeft = lw + 'px';
    band.addEventListener('dblclick', e => {
      if (e.target !== band) return;
      const dy = Math.max(0, Math.min(total-1, Math.round(e.offsetX / DAY_W)));
      const d = new Date(year, 0, 1); d.setDate(d.getDate() + dy);
      openEvent(null, lane.id, iso(d));
    });

    items.forEach(it => {
      const pr = it.ev.priority || 'normal';
      const barH = BAR_H[pr] || BAR_H.normal;
      const single = it.startDay === it.endDay;
      const c = colorOf(it.ev);
      const bar = document.createElement('div');
      bar.className = 'bar pr-' + pr + (single ? ' dot' : '');
      bar.style.height = barH + 'px';
      bar.style.top = (it.row * ROW_H + LANE_PAD + (ROW_H - barH) / 2) + 'px';
      bar.style.background = c;
      bar.style.color = textOn(c);
      if (single) {
        bar.style.width = barH + 'px';
        bar.style.left = (it.startDay * DAY_W + DAY_W / 2 - barH / 2) + 'px';
      } else {
        const w = Math.max((it.endDay - it.startDay + 1) * DAY_W, DAY_W * 2);
        bar.style.left = it.startDay * DAY_W + 'px';
        bar.style.width = w + 'px';
        if (it.clipL) bar.style.borderTopLeftRadius = bar.style.borderBottomLeftRadius = '5px';
        if (it.clipR) bar.style.borderTopRightRadius = bar.style.borderBottomRightRadius = '5px';
        const approx = it.ev.title.length * 8.4 + 30;
        if (w >= approx) {
          bar.innerHTML = `<span class="lbl">${esc(it.ev.title)}</span>`;
        } else {
          const ext = document.createElement('div');
          ext.className = 'bar-ext pr-' + pr;
          ext.textContent = it.ev.title;
          ext.style.left = (it.startDay * DAY_W + w + 9) + 'px';
          ext.style.top = (it.row * ROW_H + LANE_PAD + (ROW_H - 20) / 2) + 'px';
          ext.onclick = () => openEvent(it.ev.id);
          band.appendChild(ext);
        }
      }
      const span = it.ev.end && it.ev.end !== it.ev.start
        ? `${fmt(it.ev.start)} – ${fmt(it.ev.end)}` : fmt(it.ev.start);
      bar.title = `${it.ev.title}\n${span}` + (it.ev.note ? `\n\n${it.ev.note}` : '');
      bar.onclick = () => openEvent(it.ev.id);
      band.appendChild(bar);
    });
    grid.appendChild(band);

    const lab = document.createElement('div');
    lab.className = 'lane-label';
    lab.style.height = h + 'px';
    if (lanesCollapsed) {
      lab.style.background = tint(lane.color, 0.16);
      lab.title = lane.name + ' — click to expand';
      lab.innerHTML = `<span class="lane-strip" style="color:${lane.color}">${esc(lane.name)}</span>`;
      lab.onclick = () => setLanesCollapsed(false);
    } else {
      lab.innerHTML = `<span class="dot" style="background:${lane.color}"></span>
        <span class="nm">${esc(lane.name)}</span>
        <button class="x" title="Delete lane">✕</button>`;
      lab.querySelector('.x').onclick = () => deleteLane(lane.id);
    }
    labels.appendChild(lab);
  });
  grid.appendChild(labels);

  if (year === new Date().getFullYear()) {
    const t = new Date(); t.setHours(0,0,0,0);
    const x = lw + (dayOfYear(t)-1) * DAY_W;
    const td = document.createElement('div');
    td.className = 'today';
    td.style.left = x + 'px'; td.style.top = '54px'; td.style.height = bodyH + 'px';
    grid.appendChild(td);
    const pill = document.createElement('div');
    pill.className = 'today-pill'; pill.textContent = 'Today';
    pill.style.left = x + 'px'; pill.style.top = (54 + bodyH + 14) + 'px';
    grid.appendChild(pill);
    grid.style.paddingBottom = '52px';
    if (autoScroll) {
      autoScroll = false;
      requestAnimationFrame(() => {
        $('scroll').scrollLeft = Math.max(0, (dayOfYear(t)-1) * DAY_W - 320);
      });
    }
  }
  positionResizer();
}

function renderYearGrid() {
  const wrap = $('yeargrid');
  wrap.innerHTML = '';
  const todayIso = iso(new Date());
  for (let m = 0; m < 12; m++) {
    const mini = document.createElement('div');
    mini.className = 'mini';
    let html = `<h3>${MONTHS[m]}</h3><table><tr>${DOW.map(d=>`<th>${d}</th>`).join('')}</tr>`;
    const first = new Date(year, m, 1).getDay();
    const dim = new Date(year, m+1, 0).getDate();
    let day = 1 - first;
    for (let w = 0; w < 6; w++) {
      if (day > dim) break;
      html += '<tr>';
      for (let c = 0; c < 7; c++, day++) {
        if (day < 1 || day > dim) { html += '<td class="dim"><span class="d"></span></td>'; continue; }
        const ds = `${year}-${pad(m+1)}-${pad(day)}`;
        const evs = state.events.filter(ev =>
          !ev.backdrop && ds >= ev.start && ds <= (ev.end || ev.start));
        const cols = [...new Set(evs.map(colorOf))];
        const dots = cols.slice(0,4).map(c => `<i style="background:${c}"></i>`).join('');
        const bg = cols.length ? `style="background:${tint(cols[0], 0.22)}"` : '';
        const cls = [evs.length?'has':'', ds===todayIso?'today':''].filter(Boolean).join(' ');
        html += `<td class="${cls}" data-d="${ds}">
          <span class="d" ${cls.includes('today')?'':bg}>${day}</span>
          ${dots?`<span class="dots">${dots}</span>`:''}</td>`;
      }
      html += '</tr>';
    }
    html += '</table>';
    mini.innerHTML = html;
    mini.querySelectorAll('td[data-d]').forEach(td =>
      td.onclick = () => openDay(td.dataset.d));
    wrap.appendChild(mini);
  }
}

function render() {
  $('yearLbl').textContent = year;
  $('zoomRange').value = DAY_W;
  if (!state.lanes.length) {
    $('grid').innerHTML = '<div class="empty">No lanes yet. Add a lane to begin planning.</div>';
  } else if (view === 'timeline') {
    renderTimeline();
  }
  if (view === 'year') renderYearGrid();
}

// ---------- Tab-column resize & collapse ----------
function positionResizer() {
  const r = $('laneResizer');
  if (view !== 'timeline') { r.style.display = 'none'; return; }
  r.style.display = '';
  r.style.left = LW() + 'px';
}
function setLanesCollapsed(v) {
  lanesCollapsed = v;
  localStorage.setItem('plnr.lanesCol', v ? '1' : '0');
  renderTimeline();
}
let rafQ = false;
function softRender() {
  if (rafQ) return; rafQ = true;
  requestAnimationFrame(() => { rafQ = false; renderTimeline(); });
}
(function initResizer(){
  const h = $('laneResizer');
  let active = false;
  const SNAP = 96;   // dragged narrower than this collapses the column
  h.addEventListener('pointerdown', e => {
    active = true;
    h.classList.add('drag');
    try { h.setPointerCapture(e.pointerId); } catch (_) {}
    e.preventDefault();
  });
  h.addEventListener('pointermove', e => {
    if (!active) return;
    // splitter follows the pointer: width = pointer X from the pane's left
    const paneLeft = $('scroll').getBoundingClientRect().left;
    const target = Math.round(e.clientX - paneLeft);
    if (target < SNAP) {
      if (!lanesCollapsed) { lanesCollapsed = true; softRender(); }
    } else {
      const w = clampNum(target, 132, 480);
      if (lanesCollapsed || w !== LABEL_W) { lanesCollapsed = false; LABEL_W = w; softRender(); }
    }
  });
  function end(){ if(!active) return; active = false;
    h.classList.remove('drag');
    localStorage.setItem('plnr.labelW', LABEL_W);
    localStorage.setItem('plnr.lanesCol', lanesCollapsed ? '1' : '0');
    renderTimeline(); }
  h.addEventListener('pointerup', end);
  h.addEventListener('pointercancel', end);
  h.addEventListener('dblclick', () => setLanesCollapsed(!lanesCollapsed));
})();

// ---------- Timeline zoom ----------
function setZoom(v) {
  DAY_W = clampNum(Math.round(v), 4, 26);
  localStorage.setItem('plnr.dayW', DAY_W);
  $('zoomRange').value = DAY_W;
  renderTimeline();
}
$('zoomRange').oninput = e => setZoom(+e.target.value);
$('zoomIn').onclick  = () => setZoom(DAY_W + 2);
$('zoomOut').onclick = () => setZoom(DAY_W - 2);

// ---------- Event modal ----------
let evColor = '';
function buildSwatch(box, sel, cb) {
  box.innerHTML = '';
  PALETTE.forEach(c => {
    const b = document.createElement('button');
    b.style.background = c;
    if (c === sel) b.classList.add('sel');
    b.onclick = () => { box.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); cb(c); };
    box.appendChild(b);
  });
}

function openEvent(id, laneId, dateStr) {
  editingId = id;
  const sel = $('fLane');
  sel.innerHTML = state.lanes.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
  if (id) {
    const ev = state.events.find(e => e.id === id);
    $('evTitle').textContent = 'Edit Event';
    $('fTitle').value = ev.title;
    sel.value = ev.laneId;
    $('fStart').value = ev.start;
    $('fEnd').value = ev.end || ev.start;
    $('fNote').value = ev.note || '';
    $('fPriority').value = ev.priority || 'normal';
    evColor = ev.color || '';
    $('evDelete').style.display = '';
  } else {
    $('evTitle').textContent = 'New Event';
    $('fTitle').value = '';
    sel.value = laneId || state.lanes[0]?.id || '';
    $('fStart').value = dateStr || iso(new Date());
    $('fEnd').value = dateStr || iso(new Date());
    $('fNote').value = '';
    $('fPriority').value = 'normal';
    evColor = '';
    $('evDelete').style.display = 'none';
  }
  buildSwatch($('evSwatch'), evColor || (laneById(sel.value)||{}).color, c => evColor = c);
  $('evScrim').classList.add('open');
  $('fTitle').focus();
}

$('evSave').onclick = () => {
  const title = $('fTitle').value.trim();
  if (!title) { $('fTitle').focus(); return; }
  let start = $('fStart').value, end = $('fEnd').value || start;
  if (end < start) [start, end] = [end, start];
  const laneId = $('fLane').value;
  const useColor = evColor && evColor !== (laneById(laneId)||{}).color ? evColor : '';
  const priority = $('fPriority').value;
  if (editingId) {
    const ev = state.events.find(e => e.id === editingId);
    Object.assign(ev, { title, laneId, start, end, color: useColor,
      note: $('fNote').value.trim(), priority });
    if (priority === 'normal') delete ev.priority;
    if (!useColor) delete ev.color;
  } else {
    const ev = { id: 'e'+Date.now().toString(36), title, laneId, start, end,
      note: $('fNote').value.trim() };
    if (useColor) ev.color = useColor;
    if (priority !== 'normal') ev.priority = priority;
    state.events.push(ev);
  }
  closeModals(); save(); render();
};

$('evDelete').onclick = () => {
  if (!confirm('Delete this event?')) return;
  state.events = state.events.filter(e => e.id !== editingId);
  closeModals(); save(); render();
};

// ---------- Lane modal ----------
let lnColor = PALETTE[0];
$('addLane').onclick = () => {
  $('fLaneName').value = '';
  lnColor = PALETTE[state.lanes.length % PALETTE.length];
  buildSwatch($('lnSwatch'), lnColor, c => lnColor = c);
  $('lnScrim').classList.add('open');
  $('fLaneName').focus();
};
$('lnSave').onclick = () => {
  const name = $('fLaneName').value.trim();
  if (!name) { $('fLaneName').focus(); return; }
  state.lanes.push({ id: 'l'+Date.now().toString(36), name, color: lnColor });
  closeModals(); save(); render();
};
function deleteLane(id) {
  const lane = laneById(id);
  const n = state.events.filter(e => e.laneId === id).length;
  if (!confirm(`Delete lane "${lane.name}"${n?` and its ${n} event(s)`:''}?`)) return;
  state.lanes = state.lanes.filter(l => l.id !== id);
  state.events = state.events.filter(e => e.laneId !== id);
  save(); render();
}

// ---------- Day modal ----------
function openDay(ds) {
  pendingDay = ds;
  const d = parse(ds);
  $('dyTitle').textContent = d.toLocaleDateString(undefined,
    { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const evs = state.events.filter(ev => ds >= ev.start && ds <= (ev.end || ev.start));
  $('dySub').textContent = evs.length ? `${evs.length} item(s) on this day` : 'Nothing scheduled.';
  $('dyList').innerHTML = evs.map(ev => {
    const lane = laneById(ev.laneId) || {};
    const span = ev.end && ev.end !== ev.start ? `${fmt(ev.start)} – ${fmt(ev.end)}` : fmt(ev.start);
    return `<div class="dayrow" data-id="${ev.id}">
      <span class="dot" style="background:${colorOf(ev)}"></span>
      <div><div style="font-weight:700;color:var(--ink)">${esc(ev.title)}</div>
      <div style="font-size:11px;color:var(--ink-soft)">${esc(lane.name||'')}</div></div>
      <span class="meta">${span}</span></div>`;
  }).join('');
  $('dyList').querySelectorAll('.dayrow').forEach(r =>
    r.onclick = () => { closeModals(); openEvent(r.dataset.id); });
  $('dyScrim').classList.add('open');
}
$('dyAdd').onclick = () => { const d = pendingDay; closeModals(); openEvent(null, null, d); };

// ---------- Shell ----------
function fmt(s) { return parse(s).toLocaleDateString(undefined, { day:'numeric', month:'short' }); }
function esc(s) { return String(s).replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function closeModals() { document.querySelectorAll('.scrim').forEach(s => s.classList.remove('open')); }

$('prevY').onclick = () => { year--; autoScroll = true; render(); };
$('nextY').onclick = () => { year++; autoScroll = true; render(); };
$('todayBtn').onclick = () => { year = new Date().getFullYear(); autoScroll = true;
  if (view === 'year') { view='timeline'; switchView(); } render(); };
$('addEvent').onclick = () => openEvent(null);
$('evCancel').onclick = $('lnCancel').onclick = $('dyClose').onclick = closeModals;
document.querySelectorAll('.scrim').forEach(s =>
  s.onclick = e => { if (e.target === s) closeModals(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

function switchView() {
  $('vTimeline').classList.toggle('active', view==='timeline');
  $('vYear').classList.toggle('active', view==='year');
  $('timelineWrap').style.display = view==='timeline' ? '' : 'none';
  $('yearWrap').style.display = view==='year' ? '' : 'none';
  $('zoomGroup').style.visibility = view==='timeline' ? '' : 'hidden';
  positionResizer();
}
$('vTimeline').onclick = () => { view='timeline'; autoScroll = true; switchView(); render(); };
$('vYear').onclick = () => { view='year'; switchView(); render(); };

// Pin the tab column on horizontal scroll; collapse the top bar to a
// peek tab on vertical scroll (auto, with manual override via the tab).
const scroller = $('scroll'), topbar = $('topbar'), peek = $('peek');
let tbManualUntil = 0;
// Hysteresis: collapse only past COLLAPSE_AT, expand only under
// EXPAND_AT. The wide dead zone between them stops the collapse →
// pane-resize → re-trigger feedback loop that made it blink.
const COLLAPSE_AT = 96, EXPAND_AT = 8;
function autoTopbar(st) {
  if (Date.now() < tbManualUntil) return;
  const min = topbar.classList.contains('min');
  if (!min && st > COLLAPSE_AT) topbar.classList.add('min');
  else if (min && st < EXPAND_AT) topbar.classList.remove('min');
}
scroller.addEventListener('scroll', () => {
  const l = document.querySelector('.lane-labels');
  if (l) l.style.left = scroller.scrollLeft + 'px';
  autoTopbar(scroller.scrollTop);
}, { passive: true });
