name: Update China Access URL

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      REPO: boonchutan/aybkk-workshop
      FILE: china-access.md

    steps:
      - name: Fetch tunnel URL from Railway (with retry)
        id: rail
        run: |
          URL=""
          # On push events Railway may still be rebuilding, so retry up to 5× (5 min window).
          for attempt in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/rail.json -w '%{http_code}' --max-time 15 \
              "https://aybkk-ashtanga.up.railway.app/api/china-url" || echo 000)
            echo "attempt=$attempt http_code=$CODE"
            if [ "$CODE" = "200" ]; then
              URL=$(python3 -c "import json; print(json.load(open('/tmp/rail.json')).get('url',''))" 2>/dev/null || true)
              if [ -n "$URL" ]; then
                echo "Got tunnel URL on attempt $attempt: $URL"
                break
              fi
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Railway not ready yet, waiting 60s before retry..."
              sleep 60
            fi
          done
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build updated china-access.md
        env:
          TUNNEL_URL: ${{ steps.rail.outputs.url }}
        run: |
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          if [ -n "$TUNNEL_URL" ]; then
            printf '# 🇨🇳 中国学员访问链接 / China Student Access\n\n> 最后更新 / Last updated: %s\n\n## 今日链接 / Today'"'"'s Link\n\n**%s**\n\n点击上方链接，或复制到浏览器地址栏打开。\nTap the link above, or copy it into your browser.\n\n- 无需 VPN / No VPN needed\n- 手机微信浏览器也可使用 / Works in WeChat browser\n\n---\n\n链接每次服务器重启后会改变。如果链接失效，请通知老师获取新链接。\nThe URL changes if the server restarts. If it stops working, ask the teacher for the new link.\n' \
              "$TS" "$TUNNEL_URL" > /tmp/china-access.md
          else
            printf '# 🇨🇳 中国学员访问链接 / China Student Access\n\n> 最后检查 / Last checked: %s\n\n⏳ 服务器启动中，请 2–3 分钟后刷新此页面。\nServer is starting, please refresh in 2-3 minutes.\n' \
              "$TS" > /tmp/china-access.md
          fi
          cat /tmp/china-access.md

      - name: Update file via GitHub Contents API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/contents/$FILE" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" || true)
          if [ -z "$SHA" ]; then
            echo "Could not fetch current file SHA, skipping update"
            exit 0
          fi
          echo "Current SHA: $SHA"

          CONTENT=$(base64 -w0 /tmp/china-access.md)

          RESULT=$(curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/contents/$FILE" \
            -d "{\"message\":\"chore: update China access URL [skip ci]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Updated to', d['content']['sha'])" \
            2>&1 || echo "API PUT failed (SHA conflict or network error)")
          echo "$RESULT"
