<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYBKK Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* knowledge.html — Ashtanga knowledge base. Beech/walnut palette,
       carved cards, no side-stripes. The category-card ::before stripe
       is replaced with a top-edge highlight bar (full-width hairline). */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 480px; margin: 0 auto; padding: var(--space-5) var(--space-4); }

    header { text-align: center; margin-bottom: var(--space-7); padding-top: var(--space-6); }
    .logo {
      font-family: var(--font-display);
      font-size: clamp(28px, 7vw, 36px);
      font-weight: 800;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
      letter-spacing: -0.005em;
      margin-bottom: 8px;
    }
    .tagline {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--primary-deep);
    }

    .section { margin-bottom: var(--space-7); }
    .section-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--shadow-dark);
    }

    .category-grid { display: grid; gap: 10px; }
    .category-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      cursor: pointer;
      box-shadow:
        6px 6px 14px var(--shadow-dark),
        -3px -3px 8px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring),
                  box-shadow var(--dur-base) var(--ease-spring);
    }
    .category-card:hover { transform: translateY(-2px); }
    .category-card.active {
      background: var(--surface-2);
      transform: none;
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -2px -2px 0 rgba(253, 250, 242, 0.85),
        inset 5px 5px 12px var(--shadow-dark);
    }
    .category-name {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .category-card.active .category-name { color: var(--primary-deep); }
    .category-count {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    /* Detail panel — typographic block, no nested card */
    .detail-panel {
      padding: var(--space-4) 0;
      margin-top: var(--space-3);
      display: none;
      border-top: 1px dashed var(--shadow-dark);
      border-bottom: 1px dashed var(--shadow-dark);
      animation: slideIn 0.32s var(--ease-out);
    }
    .detail-panel.show { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .detail-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--ink);
      margin-bottom: var(--space-4);
      letter-spacing: -0.005em;
    }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .detail-item {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 13px;
      text-align: center;
      color: var(--ink);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }

    /* Series accordion */
    .series-list { display: flex; flex-direction: column; gap: 10px; }
    .series-item {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      cursor: pointer;
      box-shadow:
        6px 6px 14px var(--shadow-dark),
        -3px -3px 8px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .series-item:hover { transform: translateY(-2px); }
    .series-item.active {
      background: var(--surface-2);
      transform: none;
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -2px -2px 0 rgba(253, 250, 242, 0.85),
        inset 5px 5px 12px var(--shadow-dark);
    }
    .series-header { display: flex; justify-content: space-between; align-items: center; }
    .series-name {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--ink);
    }
    .series-count {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .series-asanas {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--shadow-dark);
    }
    .series-item.active .series-asanas { display: flex; }
    .asana-tag {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--ink);
      box-shadow:
        2px 2px 4px var(--shadow-dark),
        -1px -1px 2px var(--shadow-light);
    }
    .series-arrow {
      font-size: 18px;
      color: var(--ink-soft);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .series-item.active .series-arrow {
      transform: rotate(90deg);
      color: var(--primary-deep);
    }

    /* Concept tags */
    .concept-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .concept-tag {
      background: var(--surface);
      border: none;
      border-radius: var(--radius-pill);
      padding: 8px 16px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--primary-deep);
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .concept-tag:hover { transform: translateY(-1px); }

    /* Guru lineage */
    .guru-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .guru-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-5) var(--space-3);
      text-align: center;
      box-shadow:
        8px 8px 18px var(--shadow-dark),
        -4px -4px 10px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .guru-card:hover { transform: translateY(-3px); }
    .guru-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4ba8c 0%, #997a52 100%);
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow:
        inset 3px 3px 6px rgba(255, 240, 215, 0.3),
        inset -2px -2px 4px rgba(40, 20, 4, 0.2),
        4px 4px 10px rgba(120, 80, 40, 0.25);
    }
    .guru-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .guru-title {
      font-family: var(--font-body);
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
    }

    /* Sanskrit list */
    .sanskrit-list { display: grid; gap: 8px; }
    .sanskrit-item {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow:
        6px 6px 12px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .sanskrit-item:hover { transform: translateY(-1px); }
    .sanskrit-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--primary-deep);
      letter-spacing: 0.02em;
    }
    .sanskrit-meaning {
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    /* Photo placeholder — carved dashed cavity */
    .photo-placeholder {
      background: var(--surface-2);
      border: 2px dashed var(--shadow-dark);
      border-radius: var(--radius-md);
      padding: var(--space-7) var(--space-5);
      text-align: center;
      margin: var(--space-5) 0;
      cursor: pointer;
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .photo-placeholder:hover { transform: scale(1.02); }
    .photo-placeholder-text {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .photo-placeholder-icon {
      font-size: 32px;
      margin-bottom: 8px;
      color: var(--accent);
      opacity: 0.55;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.3;
      transform: scale(0);
      animation: ripple-effect 0.6s var(--ease-out);
      pointer-events: none;
    }
    @keyframes ripple-effect {
      to { transform: scale(4); opacity: 0; }
    }

    footer {
      text-align: center;
      padding: var(--space-7) 0 var(--space-5);
      font-family: var(--font-body);
      font-size: 12px;
      font-style: italic;
      color: var(--ink-soft);
    }
    footer a {
      color: var(--primary-deep);
      text-decoration: none;
      font-weight: 600;
      font-style: normal;
    }

    .loading {
      text-align: center;
      padding: var(--space-5);
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
    }
    .loading::after { content: ''; animation: dots 1.5s infinite; }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40%      { content: '..'; }
      60%,100% { content: '...'; }
    }

    /* Stage accordion */
    .stage-item {
      background: var(--surface);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      overflow: hidden;
      box-shadow:
        4px 4px 10px var(--shadow-dark),
        -2px -2px 6px var(--shadow-light);
    }
    .stage-header {
      padding: var(--space-4);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background var(--dur-base);
    }
    .stage-header:hover { background: var(--surface-2); }
    .stage-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }
    .stage-arrow {
      font-size: 14px;
      color: var(--ink-soft);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .stage-item.active .stage-arrow {
      transform: rotate(90deg);
      color: var(--primary-deep);
    }
    .stage-content {
      display: none;
      padding: 0 var(--space-4) var(--space-4);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--ink);
      line-height: 1.65;
    }
    .stage-item.active .stage-content { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">AYBKK</div>
      <div class="tagline">Knowledge Universe</div>
    </header>
    
    <!-- Movement Types Section -->
    <section class="section">
      <div class="section-title">Movement Types</div>
      <div class="category-grid" id="movements">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Series Section -->
    <section class="section">
      <div class="section-title">Ashtanga Series</div>
      <div class="series-list" id="series">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Sections -->
    <section class="section">
      <div class="section-title">Practice Sections</div>
      <div id="sections" class="category-grid">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Teaching Stages -->
    <section class="section">
      <div class="section-title">Teaching Journey</div>
      <div id="stages">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Core Concepts -->
    <section class="section">
      <div class="section-title">Core Concepts</div>
      <div id="concepts">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Guru Lineage -->
    <section class="section">
      <div class="section-title">Guru Lineage</div>
      <div class="guru-grid" id="gurus">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Sanskrit Origins -->
    <section class="section">
      <div class="section-title">Sanskrit Origins</div>
      <div class="sanskrit-list" id="sanskrit">
        <div class="loading">Loading</div>
      </div>
    </section>
    
    <!-- Photo Placeholder -->
    <section class="section">
      <div class="section-title">Teaching Moments</div>
      <div class="photo-placeholder" onclick="this.style.borderColor='var(--accent)'">
        <div class="photo-placeholder-icon">📷</div>
        <div class="photo-placeholder-text">Click to add photo</div>
      </div>
    </section>
    
    <footer>
      Knowledge organized by <a href="#">Plato</a> · Powered by <a href="#">Neo</a>
    </footer>
  </div>
  
  <script>
    // Ripple effect on click
    document.addEventListener('click', function(e) {
      const card = e.target.closest('.category-card, .guru-card, .series-item, .photo-placeholder, .stage-header');
      if (!card) return;
      
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      
      const rect = card.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
      
      card.style.position = 'relative';
      card.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    });
    
    // Fetch all data
    async function fetchKnowledge() {
      try {
        const [movements, series, sections, stages, concepts, gurus, sanskrit] = await Promise.all([
          fetch('/api/knowledge/body-parts').then(r => r.json()),
          fetch('/api/knowledge/series').then(r => r.json()),
          fetch('/api/knowledge/sections').then(r => r.json()),
          fetch('/api/knowledge/stages').then(r => r.json()),
          fetch('/api/knowledge/concepts').then(r => r.json()),
          fetch('/api/knowledge/gurus').then(r => r.json()),
          fetch('/api/knowledge/sanskrit').then(r => r.json())
        ]);
        
        renderMovements(movements);
        renderSeries(series);
        renderSections(sections);
        renderStages(stages);
        renderConcepts(concepts);
        renderGurus(gurus);
        renderSanskrit(sanskrit);
      } catch (err) {
        console.error('Failed to load knowledge:', err);
      }
    }
    
    function renderMovements(parts) {
      const container = document.getElementById('movements');
      if (!parts.length) {
        container.innerHTML = '<div class="category-card"><div class="category-name">No data yet</div></div>';
        return;
      }
      container.innerHTML = parts.map(part => `
        <div class="category-card" onclick="toggleDetail(this, '${part.name}')">
          <div class="category-name">${part.name}</div>
          <div class="category-count">${part.count} asanas</div>
          <div class="detail-panel" id="detail-${part.name.replace(/\s+/g, '-')}">
            <div class="detail-grid">
              ${part.asanas.slice(0, 10).map(a => `<div class="detail-item">${a}</div>`).join('')}
            </div>
            ${part.asanas.length > 10 ? `<div style="margin-top:8px;font-size:11px;color:var(--text-light)">+${part.asanas.length - 10} more</div>` : ''}
          </div>
        </div>
      `).join('');
    }
    
    function toggleDetail(card, name) {
      const panelId = 'detail-' + name.replace(/\s+/g, '-');
      const panel = document.getElementById(panelId);
      const wasActive = card.classList.contains('active');
      
      // Close all others
      document.querySelectorAll('.category-card.active').forEach(c => {
        c.classList.remove('active');
        c.querySelector('.detail-panel')?.classList.remove('show');
      });
      
      if (!wasActive) {
        card.classList.add('active');
        panel.classList.add('show');
      }
    }
    
    function renderSeries(series) {
      const container = document.getElementById('series');
      if (!series.length) {
        container.innerHTML = '<div class="series-item"><span>No series yet</span></div>';
        return;
      }
      container.innerHTML = series.map(s => `
        <div class="series-item" onclick="this.classList.toggle('active')">
          <div class="series-header">
            <div>
              <div class="series-name">${s.name}</div>
              <div class="series-count">${s.count} asanas</div>
            </div>
            <span class="series-arrow">→</span>
          </div>
          <div class="series-asanas">
            ${s.asanas.map(a => `<span class="asana-tag">${a}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }
    
    function renderSections(sections) {
      const container = document.getElementById('sections');
      if (!sections.length) {
        container.innerHTML = '<div class="category-card"><div>No sections yet</div></div>';
        return;
      }
      container.innerHTML = sections.map(s => `
        <div class="category-card" onclick="toggleDetail(this, '${s.name}')">
          <div class="category-name">${s.name}</div>
          <div class="category-count">${s.count} asanas</div>
          <div class="detail-panel" id="detail-section-${s.name.replace(/\s+/g, '-')}">
            <div class="detail-grid">
              ${s.asanas.slice(0, 8).map(a => `<div class="detail-item">${a}</div>`).join('')}
            </div>
            ${s.asanas.length > 8 ? `<div style="margin-top:8px;font-size:11px;color:var(--text-light)">+${s.asanas.length - 8} more</div>` : ''}
          </div>
        </div>
      `).join('');
    }
    
    function renderStages(stages) {
      const container = document.getElementById('stages');
      if (!stages.length) {
        container.innerHTML = '<div class="stage-item"><div class="stage-name">No stages yet</div></div>';
        return;
      }
      container.innerHTML = stages.map((s, i) => `
        <div class="stage-item" onclick="this.classList.toggle('active')">
          <div class="stage-header">
            <div class="stage-name">${i + 1}. ${s.name}</div>
            <span class="stage-arrow">→</span>
          </div>
          ${s.description ? `<div class="stage-content">${s.description}</div>` : ''}
        </div>
      `).join('');
    }
    
    function renderConcepts(concepts) {
      const container = document.getElementById('concepts');
      if (!concepts.length) {
        container.innerHTML = '<div class="concept-tags"><span class="concept-tag">No concepts yet</span></div>';
        return;
      }
      container.innerHTML = `<div class="concept-tags">${
        concepts.map(c => `<span class="concept-tag">${c.name}</span>`).join('')
      }</div>`;
    }
    
    function renderGurus(gurus) {
      const container = document.getElementById('gurus');
      if (!gurus.length) {
        container.innerHTML = '<div class="loading">No guru data</div>';
        return;
      }
      container.innerHTML = gurus.map(g => `
        <div class="guru-card">
          <div class="guru-avatar">🙏</div>
          <div class="guru-name">${g.name}</div>
          <div class="guru-title">${g.title || 'Guru'}</div>
        </div>
      `).join('');
    }
    
    function renderSanskrit(roots) {
      const container = document.getElementById('sanskrit');
      if (!roots.length) {
        container.innerHTML = '<div class="sanskrit-item"><div class="sanskrit-name">No Sanskrit roots yet</div></div>';
        return;
      }
      container.innerHTML = roots.slice(0, 15).map(r => `
        <div class="sanskrit-item">
          <div class="sanskrit-name">${r.name}</div>
          ${r.meaning ? `<div class="sanskrit-meaning">${r.meaning}</div>` : ''}
        </div>
      `).join('');
    }
    
    // Load on page ready
    document.addEventListener('DOMContentLoaded', fetchKnowledge);
  </script>
</body>
</html>
