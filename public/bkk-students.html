<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYBKK Bangkok Shala — Students</title>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* bkk-students.html — Bangkok Shala roster (admin), beech/walnut palette.
       Reserv = mossy beech, new = clay rust earth-tone chips. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      padding: var(--space-4);
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      letter-spacing: -0.012em;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
      margin-bottom: 4px;
    }
    .subtitle {
      font-family: var(--font-body);
      font-size: 13px; font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .row { display: flex; gap: 8px; margin-bottom: var(--space-3); flex-wrap: wrap; align-items: center; }
    .refresh-btn,
    .new-btn {
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      color: #f1e2c4;
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 16px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.6), -1px -1px 1px rgba(50, 28, 10, 0.7);
      box-shadow:
        6px 6px 14px rgba(120, 80, 40, 0.30),
        -3px -3px 8px var(--shadow-light),
        inset 3px 3px 6px rgba(255, 240, 215, 0.4);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .refresh-btn:hover, .new-btn:hover { transform: translateY(-2px); }

    .filter-btn {
      background: var(--surface);
      color: var(--ink-soft);
      border: none;
      border-radius: var(--radius-pill);
      padding: 7px 14px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
    }
    .filter-btn.active {
      background: var(--surface-2);
      color: var(--primary-deep);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -2px -2px 0 rgba(253, 250, 242, 0.85),
        inset 5px 5px 10px var(--shadow-dark);
    }
    .search {
      flex: 1; min-width: 160px;
      padding: 9px 14px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--surface-2);
      color: var(--ink);
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.85),
        inset 4px 4px 8px rgba(150, 120, 80, 0.16);
    }
    .search:focus { outline: none; }
    .search::placeholder { color: rgba(108, 94, 74, 0.55); font-style: italic; }

    .count {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: var(--space-3);
    }

    .student-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      box-shadow:
        12px 12px 26px var(--shadow-dark),
        -6px -6px 14px var(--shadow-light),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
      display: flex; align-items: center; gap: 12px;
    }
    .student-info { flex: 1; min-width: 0; }
    .student-name {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      box-shadow:
        inset 2px 2px 4px rgba(0, 0, 0, 0.10),
        inset -1px -1px 2px rgba(253, 250, 242, 0.45);
    }
    .badge.reserv { background: #c5cba5; color: #3d4a26; }
    .badge.new { background: #e3b89a; color: #7e3a1a; }
    .student-meta {
      font-family: var(--font-body);
      font-size: 12px; font-style: italic;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .qr-btn,
    .copy-btn {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 12px;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      white-space: nowrap;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .qr-btn {
      background: linear-gradient(135deg, #b89878, var(--accent));
      color: #fdf6e6;
      text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.4);
    }
    .qr-btn:hover { transform: translateY(-1px); }
    .copy-btn {
      background: var(--surface);
      color: var(--primary-deep);
    }
    .copy-btn:hover { transform: translateY(-1px); }
    .copy-btn.done {
      background: #ddd9c2;
      color: #4f5d3a;
      box-shadow: inset 2px 2px 4px rgba(80, 95, 60, 0.16);
    }

    .qr-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20, 14, 8, 0.92);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: var(--space-5);
    }
    .qr-overlay.show { display: flex; }
    .qr-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      text-align: center;
      width: 300px;
      position: relative;
      box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.4);
    }
    .qr-box h2 {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: #2f2517;
      margin-bottom: 4px;
    }
    .qr-box p {
      font-family: var(--font-body);
      font-size: 12px; font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .qr-box img {
      width: 220px; height: 220px;
      border-radius: var(--radius-md);
      padding: 12px;
      background: #fffaf0;
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.92),
        inset 6px 6px 12px var(--shadow-dark);
    }
    .qr-hint {
      font-family: var(--font-body);
      font-size: 11px; font-style: italic;
      color: var(--ink-soft);
      margin-top: 10px;
    }
    .close-btn {
      position: absolute; top: 12px; right: 14px;
      background: var(--surface-2);
      border: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      color: var(--primary-deep);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }

    .empty {
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
      padding: var(--space-7) 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🧘 AYBKK Bangkok Shala</h1>
  <div class="subtitle">Daily journal links — existing Reserv students + new walk-ins</div>
  <div class="row">
    <button class="refresh-btn" onclick="loadStudents()">↻ Refresh</button>
    <a class="new-btn" href="/orientation-bkk.html" target="_blank">+ New student orientation</a>
  </div>
  <div class="row">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="reserv" onclick="setFilter('reserv')">Reserv</button>
    <button class="filter-btn" data-filter="orientation" onclick="setFilter('orientation')">New</button>
    <input class="search" id="searchBox" placeholder="Search name…" oninput="render()">
  </div>
  <div id="count" class="count"></div>
  <div id="list"></div>

  <div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)closeQR()">
    <div class="qr-box">
      <button class="close-btn" onclick="closeQR()">✕</button>
      <h2 id="qrName"></h2>
      <p>Scan to open journal / สแกนเพื่อเปิดสมุดบันทึก</p>
      <img id="qrImg" src="" alt="QR">
      <div class="qr-hint">Long-press to save / กดค้างเพื่อบันทึก</div>
    </div>
  </div>

  <script>
    const API = 'https://aybkk-ashtanga.up.railway.app/api';
    let allStudents = [];
    let currentFilter = 'all';

    async function loadStudents() {
      document.getElementById('list').innerHTML = '<div class="empty">Loading…</div>';
      try {
        const res = await fetch(`${API}/orientations/bkk`);
        const data = await res.json();
        allStudents = data.students || [];
        render();
      } catch(e) {
        document.getElementById('list').innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
      }
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === f);
      });
      render();
    }

    function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function cssId(s) { return String(s||'').replace(/[^a-zA-Z0-9_-]/g, '_'); }

    function render() {
      const search = document.getElementById('searchBox').value.trim().toLowerCase();
      let list = allStudents;
      if (currentFilter !== 'all') list = list.filter(s => s.source === currentFilter);
      if (search) list = list.filter(s => (s.name || '').toLowerCase().includes(search));

      const reservCount = allStudents.filter(s=>s.source==='reserv').length;
      const newCount = allStudents.filter(s=>s.source==='orientation').length;
      document.getElementById('count').textContent =
        `${list.length} student${list.length !== 1 ? 's' : ''}` +
        (currentFilter === 'all' ? ` (${reservCount} Reserv · ${newCount} new)` : '');

      const el = document.getElementById('list');
      if (!list.length) {
        el.innerHTML = '<div class="empty">No students.</div>';
        return;
      }
      el.innerHTML = list.map(s => {
        const checkins = s.checkins || 0;
        const badge = s.source === 'reserv'
          ? '<span class="badge reserv">Reserv</span>'
          : '<span class="badge new">New</span>';
        const meta = [
          checkins + ' check-in' + (checkins !== 1 ? 's' : ''),
          s.lastDate ? 'last ' + s.lastDate : ''
        ].filter(Boolean).join(' · ');
        const k = cssId(s.id);
        return `<div class="student-card" data-id="${escapeHtml(s.id)}">
          <div class="student-info">
            <div class="student-name">${escapeHtml(s.name)} ${badge}</div>
            <div class="student-meta">${escapeHtml(meta)}</div>
          </div>
          <div class="btn-group">
            <button class="qr-btn" data-action="qr" data-id="${escapeHtml(s.id)}">QR</button>
            <button class="copy-btn" id="copy-${k}" data-action="copy" data-id="${escapeHtml(s.id)}">Copy</button>
          </div>
        </div>`;
      }).join('');
    }

    // Event delegation — avoids quoting issues with names/links
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = btn.dataset.id;
      const student = allStudents.find(s => s.id === id);
      if (!student) return;
      if (btn.dataset.action === 'qr') showQR(student);
      else if (btn.dataset.action === 'copy') copyLink(student);
    });

    async function showQR(student) {
      document.getElementById('qrName').textContent = student.name;
      document.getElementById('qrImg').src = '';
      document.getElementById('qrOverlay').classList.add('show');
      try {
        const res = await fetch(`${API}/journal/qr/${encodeURIComponent(student.id)}`);
        const data = await res.json();
        if (data.qrDataUrl) {
          document.getElementById('qrImg').src = data.qrDataUrl;
          return;
        }
      } catch(e) { /* fall through */ }
      document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(student.journalLink)}`;
    }

    function closeQR() {
      document.getElementById('qrOverlay').classList.remove('show');
    }

    async function copyLink(student) {
      try {
        await navigator.clipboard.writeText(student.journalLink);
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = student.journalLink; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      const btn = document.getElementById('copy-' + cssId(student.id));
      if (!btn) return;
      btn.textContent = '✓ Copied';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
    }

    loadStudents();
  </script>
</body>
</html>
