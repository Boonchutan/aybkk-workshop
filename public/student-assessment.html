<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Assessment</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Student Journal Summary</h1>
    <div id="student-summary">
        <ul id="journal-entries"></ul>
    </div>

    <h2>Your Assessments</h2>
    <div id="assessment-form">
        <textarea id="teacher-notes" rows="10" placeholder="Write your assessments here..."></textarea>
        <button id="save-button">Save Assessment</button>
        <button id="send-button">Send to Students</button>
    </div>

    <div id="feedback"></div>
</body>
</html>
