<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZ Students — Journal Links</title>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    /* gz-students.html — Guangzhou WS roster (admin), beech/walnut palette. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      padding: var(--space-4);
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      letter-spacing: -0.012em;
      color: #2f2517;
      text-shadow: var(--text-carve-soft);
      margin-bottom: 4px;
    }
    .subtitle {
      font-family: var(--font-body);
      font-size: 13px; font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .refresh-btn {
      background: linear-gradient(135deg, #e6d2a8 0%, var(--primary) 55%, #997a52 100%);
      color: #f1e2c4;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-family: var(--font-display);
      font-size: 12px; font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: var(--space-4);
      text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.6), -1px -1px 1px rgba(50, 28, 10, 0.7);
      box-shadow:
        8px 8px 16px rgba(120, 80, 40, 0.30),
        -4px -4px 10px var(--shadow-light),
        inset 3px 3px 6px rgba(255, 240, 215, 0.4);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .refresh-btn:hover { transform: translateY(-2px); }

    .student-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      box-shadow:
        12px 12px 26px var(--shadow-dark),
        -6px -6px 14px var(--shadow-light),
        inset 1px 1px 0 rgba(253, 250, 242, 0.7);
      display: flex; align-items: center; gap: 14px;
    }
    .student-info { flex: 1; min-width: 0; }
    .student-name {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--ink);
    }
    .student-meta {
      font-family: var(--font-body);
      font-size: 12px; font-style: italic;
      color: var(--ink-soft);
      margin-top: 4px;
    }
    .student-link {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--primary-deep);
      word-break: break-all;
      margin-top: 6px;
    }
    .btn-group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .qr-btn,
    .copy-btn {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      white-space: nowrap;
      box-shadow:
        4px 4px 8px var(--shadow-dark),
        -3px -3px 6px var(--shadow-light);
      transition: transform var(--dur-base) var(--ease-spring);
    }
    .qr-btn {
      background: linear-gradient(135deg, #b89878, var(--accent));
      color: #fdf6e6;
      text-shadow: 1px 1px 0 rgba(255, 240, 215, 0.4);
    }
    .qr-btn:hover { transform: translateY(-1px); }
    .copy-btn {
      background: var(--surface);
      color: var(--primary-deep);
    }
    .copy-btn:hover { transform: translateY(-1px); }
    .copy-btn.done {
      background: #ddd9c2;
      color: #4f5d3a;
      box-shadow: inset 2px 2px 4px rgba(80, 95, 60, 0.16);
    }

    /* QR overlay */
    .qr-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20, 14, 8, 0.92);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: var(--space-5);
    }
    .qr-overlay.show { display: flex; }
    .qr-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      text-align: center;
      width: 300px;
      position: relative;
      box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.4);
    }
    .qr-box h2 {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: #2f2517;
      margin-bottom: 4px;
    }
    .qr-box p {
      font-family: var(--font-body);
      font-size: 12px; font-style: italic;
      color: var(--ink-soft);
      margin-bottom: var(--space-4);
    }
    .qr-box img {
      width: 220px; height: 220px;
      border-radius: var(--radius-md);
      padding: 12px;
      background: #fffaf0;
      box-shadow:
        inset 3px 3px 0 rgba(150, 120, 80, 0.18),
        inset -3px -3px 0 rgba(253, 250, 242, 0.92),
        inset 6px 6px 12px var(--shadow-dark);
    }
    .qr-hint {
      font-family: var(--font-body);
      font-size: 11px; font-style: italic;
      color: var(--ink-soft);
      margin-top: 10px;
    }
    .close-btn {
      position: absolute; top: 12px; right: 14px;
      background: var(--surface-2);
      border: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      color: var(--primary-deep);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 2px var(--shadow-light);
    }

    .empty {
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-soft);
      padding: var(--space-7) 0;
      font-size: 14px;
    }
    .count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary-deep);
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>
  <h1>🧘 GZ Workshop Students</h1>
  <div class="subtitle">广州工作坊 — 学员练习记录链接</div>
  <button class="refresh-btn" onclick="loadStudents()">↻ Refresh</button>
  <div id="count" class="count"></div>
  <div id="list"></div>

  <!-- QR overlay -->
  <div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)closeQR()">
    <div class="qr-box">
      <button class="close-btn" onclick="closeQR()">✕</button>
      <h2 id="qrName"></h2>
      <p>扫码打开练习记录 / Scan to open journal</p>
      <img id="qrImg" src="" alt="QR">
      <div class="qr-hint">长按图片保存 / Long-press to save</div>
    </div>
  </div>

  <script>
    const API = 'https://aybkk-ashtanga.up.railway.app/api';

    async function loadStudents() {
      document.getElementById('list').innerHTML = '<div class="empty">Loading...</div>';
      try {
        const res = await fetch(`${API}/journal/students?isChinese=true`);
        const data = await res.json();
        render(data.students || []);
      } catch(e) {
        document.getElementById('list').innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
      }
    }

    function render(students) {
      // Filter to GZ only — location=guangzhou OR id starts with gz-
      const gz = students.filter(s =>
        s.location === 'guangzhou' ||
        (s.id && s.id.startsWith('gz-'))
      );
      document.getElementById('count').textContent = gz.length + ' GZ students';
      if (!gz.length) {
        document.getElementById('list').innerHTML = '<div class="empty">No students yet.</div>';
        return;
      }
      document.getElementById('list').innerHTML = gz.map(s => {
        const link = `https://aybkk-ashtanga.up.railway.app/student.html?id=${s.id}&name=${encodeURIComponent(s.name)}&lang=zh&location=guangzhou`;
        const checkins = s.assessmentCount || 0;
        return `<div class="student-card">
          <div class="student-info">
            <div class="student-name">${s.name}</div>
            <div class="student-meta">${checkins} check-in${checkins !== 1 ? 's' : ''}</div>
            <div class="student-link">${link}</div>
          </div>
          <div class="btn-group">
            <button class="qr-btn" onclick="showQR('${s.id}','${s.name.replace(/'/g,"\\'")}')">QR</button>
            <button class="copy-btn" id="copy-${s.id}" onclick="copyLink('${s.id}','${link}')">Copy</button>
          </div>
        </div>`;
      }).join('');
    }

    async function showQR(studentId, name) {
      document.getElementById('qrName').textContent = name;
      document.getElementById('qrImg').src = '';
      document.getElementById('qrOverlay').classList.add('show');
      try {
        const res = await fetch(`${API}/journal/qr/${studentId}`);
        const data = await res.json();
        document.getElementById('qrImg').src = data.qrDataUrl;
      } catch(e) {
        document.getElementById('qrImg').alt = 'QR failed';
      }
    }

    function closeQR() {
      document.getElementById('qrOverlay').classList.remove('show');
    }

    async function copyLink(id, link) {
      try {
        await navigator.clipboard.writeText(link);
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = link; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      const btn = document.getElementById('copy-' + id);
      btn.textContent = '✓ Copied';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
    }

    loadStudents();
  </script>
</body>
</html>
